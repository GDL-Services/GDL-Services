/* generic confirm */
function confirmGeneric(msg,onYes){
  const body=el('div');body.innerHTML=`<p style="font-size:15px;line-height:1.5;padding:6px 2px 4px">${msg}</p>`;
  const foot=el('div','sheet-foot');const no=el('button','btn btn-ghost','Annulla');no.onclick=()=>sheet.close();
  const yes=el('button','btn','Conferma');yes.style.background='var(--danger)';yes.style.color='#fff';yes.onclick=async()=>{await onYes();sheet.close()};
  foot.appendChild(no);foot.appendChild(yes);const sheet=openSheet('Conferma',body,foot);
}

async function primeShared(){
  // Solo anteprima Claude / locale: crea le chiavi vuote se mancano,
  // così i controlli periodici non generano errori 404. NON tocca Firebase.
  if(Store.mode!=='claude'&&Store.mode!=='local')return;
  for(const c of ['bookings','spese','entrate','mezzi','manutenzioni','documenti','contratti','allegati','settings']){
    try{const m=await Store.read(c);if(!m||!Object.keys(m).length)await Store.write(c,{})}catch(e){}
  }
}
async function boot(){
  await Store.init();
  const pill=$('#sync-pill'),txt=$('#sync-txt');
  if(Store.mode==='firebase'){pill.classList.add('cloud');txt.textContent='Cloud sincronizzato'}
  else if(Store.fbTried){txt.textContent='Cloud non connesso';pill.title='Config letta ma connessione fallita: apri l\'app da https:// (non file://)'}
  else if(Store.mode==='claude'){pill.classList.add('cloud');txt.textContent='Condiviso'}
  else txt.textContent='Locale';
  STATE.me=await Store.getPref('me');renderWho();
  if(Store.mode==='firebase'){
    const meta=await Store.getMeta();
    if(!meta.initialized){
      for(const c of ['inventory','bookings','spese'])await Store.migrate(c);
      const inv=await Store.loadAll('inventory');
      if(!inv.length){const def=JSON.parse(JSON.stringify(INV_DEFAULT));for(const id of Object.keys(def))await Store.saveItem('inventory',def[id])}
      await Store.deleteOld();
      await Store.setMeta({initialized:true});
    }
    await loadInventory();
  }else{
    await loadInventory();
    await seedIfEmpty();
    await primeShared();
  }
  STATE.bookings=await Store.loadAll('bookings');
  STATE.spese=await Store.loadAll('spese');
  STATE.entrate=await Store.loadAll('entrate');
  STATE.mezzi=await Store.loadAll('mezzi');
  STATE.manutenzioni=await Store.loadAll('manutenzioni');
  STATE.documenti=await Store.loadAll('documenti');
  STATE.contratti=await Store.loadAll('contratti');
  STATE.allegati=await Store.loadAll('allegati');
  const _settings=await Store.loadAll('settings');const _cz=_settings.find(s=>s.id==='condizioni');STATE.condizioni=_cz?_cz.text:CONDIZIONI_DEFAULT;
  if(!STATE.mezzi.length){
    let doSeed=true;
    if(Store.mode==='firebase'){const _m=await Store.getMeta();doSeed=!_m.masterSeeded;if(doSeed)await Store.setMeta({masterSeeded:true})}
    if(doSeed){const v=defaultVehicle();await Store.saveItem('mezzi',v);STATE.mezzi=[v];STATE.mezzoSel=v.id}
  }
  const _exV=STATE.mezzi.find(m=>m.id==='mezzo_master');
  if(_exV&&_exV.nome==='Renault Master'){const v=defaultVehicle();v.targa=_exV.targa||'';await Store.saveItem('mezzi',v);const _i=STATE.mezzi.findIndex(m=>m.id==='mezzo_master');if(_i>=0)STATE.mezzi[_i]=v}
  Store.watch('bookings',arr=>{STATE.bookings=arr;render()});
  Store.watch('spese',arr=>{STATE.spese=arr;render()});
  Store.watch('entrate',arr=>{STATE.entrate=arr;render()});
  Store.watch('mezzi',arr=>{STATE.mezzi=arr;render()});
  Store.watch('manutenzioni',arr=>{STATE.manutenzioni=arr;render()});
  Store.watch('documenti',arr=>{STATE.documenti=arr;render()});
  Store.watch('contratti',arr=>{STATE.contratti=arr;render()});
  Store.watch('allegati',arr=>{STATE.allegati=arr;render()});
  Store.watch('settings',arr=>{const c=arr.find(s=>s.id==='condizioni');if(c)STATE.condizioni=c.text;render()});
  Store.watch('inventory',map=>{const m={};arr_to_map(map,m);INV=m;render()});
  $('#whoami').onclick=openPicker;
  $('#fab').onclick=onFab;
  render();
  if(!STATE.me)setTimeout(openPicker,400);
  if('serviceWorker' in navigator){try{await navigator.serviceWorker.register('service-worker.js')}catch(e){}}
}
function arr_to_map(arr,target){(arr||[]).forEach(o=>{if(o&&o.id)target[o.id]=o})}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();STATE._deferredPrompt=e;if(STATE.tab==='cal')render()});
boot();
</script>
