<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B1F3A">
<meta name="description" content="Gestione noleggi attrezzature per eventi — GDL Services">
<title>GDL Services · Gestione Noleggi</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy-900:#0B1F3A; --navy-800:#102844; --navy-700:#16345A; --navy-600:#1E436F;
  --gold:#E0A92E; --gold-soft:#F2C94C; --gold-deep:#C8901C;
  --paper:#F6F4EE; --paper-2:#EEEBE2; --surface:#FFFFFF;
  --ink:#16223A; --muted:#6B7689; --line:#E4E1D8;
  --confirm:#179E72; --confirm-soft:#E2F4EC;
  --pending:#D7942A; --pending-soft:#FBF0DC;
  --reimb:#EA7A1C; --reimb-soft:#FBEAD9;
  --danger:#D44A4A; --danger-soft:#FBE7E7;
  --shadow:0 10px 30px -12px rgba(11,31,58,.28);
  --shadow-sm:0 2px 8px -2px rgba(11,31,58,.16);
  --r:18px; --r-sm:12px;
  --display:'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --body:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--body);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;overflow:hidden;position:fixed;inset:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
.app{display:flex;flex-direction:column;height:100%;max-width:720px;margin:0 auto;background:var(--paper);position:relative;overflow:hidden}

.topbar{background:linear-gradient(160deg,var(--navy-900),var(--navy-700));color:#fff;
  padding:calc(14px + env(safe-area-inset-top,0px)) 18px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  box-shadow:0 6px 22px -10px rgba(11,31,58,.6);z-index:5;flex-shrink:0}
.brand{display:flex;align-items:center;gap:11px}
.logo-plate{background:#fff;border-radius:13px;padding:8px 13px;display:flex;align-items:center;
  box-shadow:0 4px 14px -6px rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.5)}
.logo-plate img{height:32px;width:auto;display:block}
.whoami{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:7px 11px;border-radius:999px;font-weight:700;font-size:13px}
.whoami .dot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800;font-family:var(--display)}
.whoami .chev{opacity:.6;font-size:11px}
.sync-pill{font-size:10.5px;font-weight:700;letter-spacing:.4px;display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.72)}
.sync-pill .led{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 3px rgba(224,169,46,.2)}
.sync-pill.cloud .led{background:#41d6a3;box-shadow:0 0 0 3px rgba(65,214,163,.2)}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:18px 16px 122px}
.view{animation:rise .32s cubic-bezier(.2,.7,.3,1)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.vhead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px}
.vhead h1{font-family:var(--display);font-size:25px;font-weight:800;letter-spacing:-.7px}
.vhead .sub{color:var(--muted);font-size:13px;font-weight:500;margin-top:3px}

/* calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav .mo{font-family:var(--display);font-weight:700;font-size:18px;text-transform:capitalize}
.cal-nav button{width:38px;height:38px;border-radius:11px;background:var(--surface);box-shadow:var(--shadow-sm);display:grid;place-items:center;font-size:17px;color:var(--navy-700);transition:.15s}
.cal-nav button:active{transform:scale(.92)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow{text-align:center;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding-bottom:4px}
.cal-cell{aspect-ratio:1/1.08;border-radius:13px;background:var(--surface);padding:6px 0 0;position:relative;display:flex;flex-direction:column;align-items:center;box-shadow:var(--shadow-sm);transition:transform .12s;overflow:hidden}
.cal-cell:active{transform:scale(.94)}
.cal-cell.out{background:transparent;box-shadow:none;pointer-events:none}
.cal-cell.today{outline:2px solid var(--gold)}
.cal-cell .dn{font-weight:700;font-size:14px;font-family:var(--display)}
.cal-cell.today .dn{color:var(--gold-deep)}
.cal-cell .load{position:absolute;left:0;right:0;bottom:0;height:5px}
.cal-cell .badges{display:flex;gap:3px;margin-top:auto;margin-bottom:8px;flex-wrap:wrap;justify-content:center;padding:0 3px}
.cal-cell .badge{width:7px;height:7px;border-radius:50%}
.bg-confirm{background:var(--confirm)} .bg-pending{background:var(--pending)}
.cal-cell .cnt{position:absolute;top:5px;right:6px;font-size:9px;font-weight:800;color:#fff;background:var(--navy-700);min-width:15px;height:15px;border-radius:8px;display:grid;place-items:center;padding:0 3px}
.cal-legend{display:flex;gap:16px;justify-content:center;margin-top:14px;font-size:12px;color:var(--muted);font-weight:600}
.cal-legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}

/* cards */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:15px 16px;margin-bottom:11px;position:relative;overflow:hidden}
.bk{display:flex;gap:13px;align-items:stretch}
.bk .rail{width:4px;border-radius:4px;flex-shrink:0}
.bk.s-confermato .rail,.bk.s-pagata .rail,.bk.s-rimborsata .rail{background:var(--confirm)}
.bk.s-da_confermare .rail,.bk.s-da_pagare .rail{background:var(--pending)}
.bk.s-da_rimborsare .rail{background:var(--reimb)}
.bk-main{flex:1;min-width:0}
.bk-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.bk-cliente{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:-.3px}
.bk-importo{font-family:var(--display);font-weight:800;font-size:16px;white-space:nowrap;color:var(--navy-800)}
.bk-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center}
.tag{font-size:11px;font-weight:700;padding:4px 9px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.tag.date{background:var(--paper-2);color:var(--ink)}
.tag.sell{background:#EAF0FA;color:var(--navy-700)}
.tag.pay{background:#EEF2F7;color:var(--navy-700)}
.tag.cat{background:var(--paper-2);color:var(--muted)}
.status-chip{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;letter-spacing:.2px}
.status-chip.confermato,.status-chip.pagata,.status-chip.rimborsata{background:var(--confirm-soft);color:var(--confirm)}
.status-chip.da_confermare,.status-chip.da_pagare{background:var(--pending-soft);color:var(--pending)}
.status-chip.da_rimborsare{background:var(--reimb-soft);color:var(--reimb)}
.bk-eq{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.eq-chip{font-size:11px;font-weight:600;color:var(--muted);background:var(--paper);border:1px solid var(--line);padding:3px 8px;border-radius:7px;display:inline-flex;align-items:center;gap:4px}
.eq-chip b{color:var(--ink);font-weight:800}

.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty .ico{width:64px;height:64px;border-radius:20px;background:var(--surface);box-shadow:var(--shadow-sm);display:grid;place-items:center;margin:0 auto 14px;font-size:28px}
.empty h3{font-family:var(--display);color:var(--ink);font-size:17px;margin-bottom:6px}
.empty p{font-size:13.5px;line-height:1.5}

.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 14px;border-radius:999px;background:var(--surface);box-shadow:var(--shadow-sm);font-size:13px;font-weight:700;color:var(--muted);transition:.15s}
.chip.on{background:var(--navy-800);color:#fff}
.search{width:100%;padding:12px 14px;border-radius:13px;border:1px solid var(--line);background:var(--surface);margin-bottom:14px;font-weight:500;box-shadow:var(--shadow-sm)}
.search:focus{outline:2px solid var(--gold);border-color:transparent}

/* magazzino / availability */
.dz{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:14px 16px;margin-bottom:16px}
.dz label{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px}
.dz-row{display:flex;gap:10px}.dz-row .f{flex:1}
.dz input[type=date]{width:100%;padding:11px 12px;border-radius:11px;border:1px solid var(--line);background:var(--paper)}
.res{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:15px 16px;margin-bottom:11px}
.res-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
.res-name{font-family:var(--display);font-weight:700;font-size:15px}
.res-name small{display:block;font-family:var(--body);font-weight:500;font-size:11px;color:var(--muted);letter-spacing:0}
.res-free{font-family:var(--display);font-weight:800;font-size:15px}
.res-free.ok{color:var(--confirm)} .res-free.warn{color:var(--pending)} .res-free.full{color:var(--danger)}
.bar{height:11px;border-radius:6px;background:var(--paper-2);overflow:hidden;display:flex}
.bar .seg{height:100%;transition:width .6s cubic-bezier(.2,.7,.3,1)}
.bar .seg.c{background:var(--confirm)} .bar .seg.p{background:var(--pending);opacity:.65}
.res-legend{display:flex;justify-content:space-between;margin-top:8px;font-size:11.5px;font-weight:600;color:var(--muted)}
.res-legend b{color:var(--ink)}

.asset-row{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow-sm);padding:12px 14px;margin-bottom:9px;transition:transform .12s}
.asset-row:active{transform:scale(.98)}
.asset-row .ic{width:38px;height:38px;border-radius:11px;background:var(--paper);display:grid;place-items:center;color:var(--navy-700);flex-shrink:0}
.asset-row .tx{flex:1;min-width:0}.asset-row .tx .nm{font-weight:700}
.asset-row .tx .meta{font-size:12px;color:var(--muted);font-weight:600;margin-top:1px}
.asset-row .tot{font-family:var(--display);font-weight:800;font-size:17px}
.asset-row .edit{color:var(--muted);font-size:16px;padding-left:6px}
.add-asset{width:100%;border:1.5px dashed var(--line);background:transparent;border-radius:14px;padding:15px;font-weight:800;color:var(--navy-700);font-family:var(--display);transition:.15s}
.add-asset:active{background:var(--paper-2)}

/* KPIs */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:8px}
.kpi{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:15px 16px}
.kpi.feat{grid-column:1/-1;background:linear-gradient(150deg,var(--navy-900),var(--navy-700));color:#fff}
.kpi.wide{grid-column:1/-1}
.kpi .k-lab{font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.3px}
.kpi.feat .k-lab{color:rgba(255,255,255,.6)}
.kpi .k-val{font-family:var(--display);font-weight:800;font-size:24px;margin-top:6px;letter-spacing:-1px}
.kpi.feat .k-val{font-size:32px}
.kpi .k-val .cur{font-size:15px;opacity:.6;margin-right:2px}
.kpi .k-sub{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:600}
.kpi.feat .k-sub{color:var(--gold-soft)}
.sect-t{font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:.2px;margin:20px 2px 11px;text-transform:uppercase;color:var(--muted)}
.seller-row{display:flex;align-items:center;gap:11px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow-sm);padding:11px 13px;margin-bottom:8px}
.seller-row .dot{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;font-family:var(--display);flex-shrink:0}
.seller-row .nm{font-weight:700;flex:1}
.seller-row .ct{font-size:12px;color:var(--muted);font-weight:600}
.seller-row .amt{font-family:var(--display);font-weight:800}

/* tabbar + fab */
.tabbar{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;padding:7px 4px calc(7px + var(--safe-b));z-index:8}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;color:var(--muted);border-radius:12px;transition:.15s}
.tab svg{width:21px;height:21px}
.tab span{font-size:9.5px;font-weight:700;letter-spacing:.1px}
.tab.on{color:var(--navy-800)}
.tab.on svg{stroke:var(--gold);color:var(--gold)}
.fab{position:absolute;right:18px;bottom:calc(80px + var(--safe-b));width:60px;height:60px;border-radius:20px;background:linear-gradient(150deg,var(--gold-soft),var(--gold-deep));color:#1a1300;display:grid;place-items:center;box-shadow:0 12px 26px -8px rgba(200,144,28,.65);z-index:9;transition:transform .16s}
.fab:active{transform:scale(.9) rotate(90deg)}
.fab svg{width:28px;height:28px}

/* sheet */
.scrim{position:fixed;inset:0;background:rgba(11,31,58,.5);backdrop-filter:blur(3px);z-index:50;opacity:0;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center}
.scrim.show{opacity:1}
.sheet{background:var(--paper);width:100%;max-width:720px;max-height:92vh;border-radius:26px 26px 0 0;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.8,.25,1);overflow:hidden}
.scrim.show .sheet{transform:none}
.sheet-grab{width:40px;height:4px;border-radius:3px;background:var(--line);margin:10px auto 0}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 12px}
.sheet-head h2{font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:-.4px}
.sheet-head .x{width:34px;height:34px;border-radius:50%;background:var(--paper-2);display:grid;place-items:center;font-size:17px;color:var(--muted)}
.sheet-body{overflow-y:auto;padding:4px 18px 18px;flex:1}
.field{margin-bottom:15px}
.field>label{font-size:12px;font-weight:800;letter-spacing:.3px;color:var(--navy-700);display:block;margin-bottom:7px}
.input{width:100%;padding:13px 14px;border-radius:13px;border:1px solid var(--line);background:var(--surface);font-weight:500;transition:.15s}
.input:focus{outline:2px solid var(--gold);border-color:transparent}
textarea.input{resize:none;min-height:62px}
.two{display:flex;gap:11px}.two>*{flex:1}
.seg-pick{display:flex;gap:7px;flex-wrap:wrap}
.seg-pick .opt{flex:1;min-width:calc(50% - 4px);padding:11px;border-radius:12px;border:1.5px solid var(--line);background:var(--surface);font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px;transition:.15s}
.seg-pick .opt .av{margin-left:auto;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:800;font-family:var(--display)}
.seg-pick .opt.on{border-color:var(--navy-800);background:var(--navy-800);color:#fff}
.status-pick{display:flex;gap:9px;flex-wrap:wrap}
.status-pick .opt{flex:1;min-width:calc(50% - 5px);padding:12px;border-radius:13px;border:1.5px solid var(--line);text-align:center;font-weight:800;font-size:13.5px;background:var(--surface);transition:.15s}
.status-pick .opt.on.pen{border-color:var(--pending);background:var(--pending-soft);color:var(--pending)}
.status-pick .opt.on.con{border-color:var(--confirm);background:var(--confirm-soft);color:var(--confirm)}
.status-pick .opt.on.rmb{border-color:var(--reimb);background:var(--reimb-soft);color:var(--reimb)}

.eqitem{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:9px}
.eqitem .ei-ic{width:34px;height:34px;border-radius:10px;background:var(--paper);display:grid;place-items:center;flex-shrink:0;color:var(--navy-700)}
.eqitem .ei-tx{flex:1;min-width:0}.eqitem .ei-tx .nm{font-weight:700;font-size:14px}
.eqitem .ei-tx .av{font-size:11px;font-weight:600;color:var(--muted);margin-top:1px}
.eqitem .ei-tx .av.bad{color:var(--danger)}
.stepper{display:flex;align-items:center;background:var(--paper);border-radius:11px;overflow:hidden;flex-shrink:0}
.stepper button{width:34px;height:36px;font-size:19px;font-weight:700;color:var(--navy-700);display:grid;place-items:center}
.stepper button:active{background:var(--paper-2)}
.stepper .qv{width:48px;text-align:center;font-family:var(--display);font-weight:800;font-size:16px;border:none;background:transparent;color:var(--ink);padding:0;-moz-appearance:textfield}
.stepper input.qv::-webkit-outer-spin-button,.stepper input.qv::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.stepper input.qv:focus{outline:none}
.toggle{width:50px;height:30px;border-radius:999px;background:var(--line);position:relative;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--confirm)}
.toggle::after{content:'';position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{left:23px}

.warn-box{background:var(--danger-soft);border:1px solid #f3c9c9;border-radius:13px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;font-size:12.5px;font-weight:600;color:#9a2a2a;line-height:1.45}
.warn-box svg{width:18px;height:18px;flex-shrink:0;margin-top:1px}

.sheet-foot{padding:12px 18px calc(14px + var(--safe-b));border-top:1px solid var(--line);background:var(--paper);display:flex;gap:10px}
.btn{flex:1;padding:15px;border-radius:15px;font-family:var(--display);font-weight:800;font-size:15px;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(150deg,var(--gold-soft),var(--gold-deep));color:#1a1300;box-shadow:0 8px 20px -8px rgba(200,144,28,.6)}
.btn-primary:disabled{opacity:.45;box-shadow:none}
.btn-ghost{background:var(--surface);color:var(--navy-800);box-shadow:var(--shadow-sm);flex:0 0 auto;padding:15px 18px}
.btn-danger{background:var(--danger-soft);color:var(--danger);flex:0 0 auto;padding:15px 18px}
.det-acts{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap}
.det-acts .btn{font-size:14px;padding:13px}

.picker .opt{display:flex;align-items:center;gap:13px;padding:14px;border-radius:15px;background:var(--surface);box-shadow:var(--shadow-sm);margin-bottom:9px;font-weight:700;font-size:16px}
.picker .opt .dot{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-family:var(--display)}

.toast{position:absolute;left:50%;bottom:calc(96px + var(--safe-b));transform:translateX(-50%) translateY(20px);background:var(--navy-900);color:#fff;padding:12px 18px;border-radius:14px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow);z-index:60;opacity:0;transition:.28s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.install-banner{display:none;align-items:center;gap:12px;background:linear-gradient(150deg,var(--navy-800),var(--navy-600));color:#fff;border-radius:var(--r);padding:13px 15px;margin-bottom:16px}
.install-banner.show{display:flex}
.install-banner .it{flex:1;font-size:13px;line-height:1.4}.install-banner .it b{font-family:var(--display)}
.install-banner button{background:var(--gold);color:#1a1300;font-weight:800;padding:9px 14px;border-radius:11px;font-size:13px;flex-shrink:0}
.install-banner .close{background:transparent;color:rgba(255,255,255,.6);font-size:18px;padding:4px}

@media(min-width:560px){.seg-pick .opt{min-width:calc(33.33% - 5px)}}
/* --- Altro / menu --- */
.back-btn{background:var(--surface);box-shadow:var(--shadow-sm);color:var(--navy-700);font-weight:700;font-size:13px;padding:7px 13px;border-radius:999px;margin-bottom:12px}
.menu-grid{display:flex;flex-direction:column;gap:11px}
.menu-card{display:flex;align-items:center;gap:14px;background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:15px 16px;text-align:left;transition:transform .12s}
.menu-card:active{transform:scale(.98)}
.menu-card .mc-ic{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;flex-shrink:0}
.menu-card .mc-ic svg{width:24px;height:24px}
.menu-card .mc-tx{flex:1}
.menu-card .mc-l{font-family:var(--display);font-weight:700;font-size:16px}
.menu-card .mc-s{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px}
.menu-card .mc-ar{font-size:22px;color:var(--line);font-weight:700}
.wide-btn{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--surface);box-shadow:var(--shadow-sm);border-radius:14px;padding:14px 16px;font-weight:700;color:var(--navy-800);margin-bottom:14px;font-size:14px}
.wide-btn .mc-ar{font-size:20px;color:var(--line)}

/* --- Mezzo: foto reale + hotspot --- */
.vehicle{position:relative;width:100%;line-height:0;border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm);background:#e7ecf3}
.veh-img{width:100%;height:auto;display:block}
.hot{position:absolute;background:transparent;border:0;padding:0;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:10px}
.hot .pin{width:27px;height:27px;border-radius:50%;background:rgba(255,255,255,.94);box-shadow:0 2px 7px rgba(0,0,0,.32);display:grid;place-items:center;color:var(--navy-700);border:1.6px solid var(--navy-700);transition:transform .15s}
.hot:hover{background:rgba(11,31,58,.12)}
.hot:active{background:rgba(11,31,58,.18)}
.hot:active .pin{transform:scale(.88)}

.van-wrap{background:linear-gradient(160deg,#eef2f7,#e3e8f0);border-radius:var(--r);padding:14px;margin-bottom:8px;box-shadow:var(--shadow-sm)}
.van{width:100%;height:auto;display:block}
.van-part{cursor:pointer;transition:opacity .15s}
.van-part:active{opacity:.6}
.hint{font-size:12px;color:var(--muted);text-align:center;font-weight:600;margin:6px 4px 14px;line-height:1.4}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:520px){.comp-grid{grid-template-columns:1fr 1fr 1fr}}
.comp-card{background:var(--surface);border-radius:15px;box-shadow:var(--shadow-sm);padding:13px 12px;text-align:center;transition:transform .12s;display:flex;flex-direction:column;align-items:center;gap:6px}
.comp-card:active{transform:scale(.95)}
.comp-card .cc-ic{width:42px;height:42px;border-radius:12px;background:var(--paper);display:grid;place-items:center;color:var(--navy-700)}
.comp-card .cc-l{font-weight:700;font-size:12.5px;line-height:1.2}
.comp-card .cc-s{font-size:10.5px;color:var(--muted);font-weight:600}

/* --- File upload --- */
.file-box{margin-top:2px}
.file-add{width:100%;border:1.5px dashed var(--line);background:var(--paper);border-radius:13px;padding:16px;font-weight:700;color:var(--navy-700);font-size:13.5px}
.file-add:active{background:var(--paper-2)}
.file-prev{width:100%;height:140px;border-radius:13px;overflow:hidden;background:var(--paper-2);display:grid;place-items:center;margin-bottom:8px}
.file-prev img{width:100%;height:100%;object-fit:cover}
.file-prev span{font-family:var(--display);font-weight:800;color:var(--navy-600);font-size:22px;letter-spacing:1px}
.file-meta{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:8px}
.file-meta .fn{color:var(--ink);max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-acts{display:flex;gap:9px}
.file-act{flex:1;background:var(--surface);box-shadow:var(--shadow-sm);border-radius:11px;padding:10px;font-weight:700;color:var(--navy-700);font-size:13px}

/* --- Documenti --- */
.doc-ic{width:46px;height:46px;border-radius:12px;overflow:hidden;background:var(--paper-2);display:grid;place-items:center;flex-shrink:0}
.doc-ic img{width:100%;height:100%;object-fit:cover}
.doc-ic span{font-family:var(--display);font-weight:800;color:var(--navy-600);font-size:13px}
.scad{font-size:11px;font-weight:800;padding:4px 9px;border-radius:8px}
.scad.ok{background:var(--confirm-soft);color:var(--confirm)}
.scad.soon{background:var(--pending-soft);color:var(--pending)}
.scad.exp{background:var(--danger-soft);color:var(--danger)}

/* --- Allegati --- */
.alleg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.alleg{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--paper-2);box-shadow:var(--shadow-sm);display:grid;place-items:center;cursor:pointer}
.alleg img{width:100%;height:100%;object-fit:cover}
.alleg-pdf{font-family:var(--display);font-weight:800;color:var(--navy-600)}
.alleg-x{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(11,31,58,.7);color:#fff;font-size:11px;display:grid;place-items:center}
.alleg.add{border:1.5px dashed var(--line);background:transparent;font-size:26px;color:var(--navy-600);font-weight:700;cursor:pointer}

/* --- Entrate status --- */
.bk.s-incassata .rail,.bk.s-versata .rail{background:var(--confirm)}
.bk.s-da_incassare .rail{background:var(--pending)}
.bk.s-da_versare .rail{background:var(--reimb)}
.status-chip.incassata,.status-chip.versata{background:var(--confirm-soft);color:var(--confirm)}
.status-chip.da_incassare{background:var(--pending-soft);color:var(--pending)}
.status-chip.da_versare{background:var(--reimb-soft);color:var(--reimb)}

.alleg-add-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.alleg-btn{flex:1;min-width:92px;text-align:center;background:var(--surface);box-shadow:var(--shadow-sm);border-radius:11px;padding:11px 8px;font-weight:700;color:var(--navy-700);font-size:12.5px;cursor:pointer}
.alleg-btn:active{background:var(--paper-2)}
.alleg-tag{position:absolute;left:3px;bottom:3px;background:rgba(11,31,58,.82);color:#fff;font-size:8.5px;font-weight:800;letter-spacing:.5px;padding:2px 5px;border-radius:6px}
.sig-wrap{border:1.5px dashed var(--line);border-radius:12px;background:#fff;height:200px;overflow:hidden}
.sig-canvas{width:100%;height:100%;touch-action:none;display:block}
</style>
</head>

  if(da.getMonth()===db.getMonth())return `${da.getDate()}–${db.getDate()} ${MESI[da.getMonth()].slice(0,3)}`;
  return `${da.getDate()} ${MESI[da.getMonth()].slice(0,3)} – ${db.getDate()} ${MESI[db.getMonth()].slice(0,3)}`}
function fmtDay(s){const d=parse(s);return `${d.getDate()} ${MESI[d.getMonth()].slice(0,3)} ${d.getFullYear()}`}
const euro=n=>'€ '+(Number(n)||0).toLocaleString('it-IT',{minimumFractionDigits:0,maximumFractionDigits:0});

/* ============================================================
   STORE — multi-collezione, multi-backend
   Priorità: Firebase (PWA) > window.storage (Claude) > localStorage
   ============================================================ */
const COLLS={
  bookings:{key:'gdl_bookings_v1',docOld:'prenotazioni',coll:'prenotazioni'},
  spese:{key:'gdl_spese_v1',docOld:'spese',coll:'spese'},
  inventory:{key:'gdl_inventory_v1',docOld:'inventario',coll:'inventario'},
  entrate:{key:'gdl_entrate_v1',coll:'entrate'},
  mezzi:{key:'gdl_mezzi_v1',coll:'mezzi'},
  manutenzioni:{key:'gdl_manut_v1',coll:'manutenzioni'},
  documenti:{key:'gdl_documenti_v1',coll:'documenti'},
  contratti:{key:'gdl_contratti_v1',coll:'contratti'},
  allegati:{key:'gdl_allegati_v1',coll:'allegati'},
  settings:{key:'gdl_settings_v1',coll:'settings'},
};
const Store={
  mode:'local', fb:null, _cache:{bookings:{},spese:{},inventory:{},entrate:{},mezzi:{},manutenzioni:{},documenti:{},contratti:{},allegati:{},settings:{}}, _watchers:{}, _poll:null,

  fbTried:false, fbError:null,
  async init(){
    if(window.FIREBASE_CONFIG&&window.FIREBASE_CONFIG.apiKey){
      this.fbTried=true;
      try{await this._initFirebase();this.mode='firebase';return}
      catch(e){this.fbError=e;console.warn('Firebase non connesso:',e)}
    }
    if(window.storage&&typeof window.storage.get==='function'){this.mode='claude';return}
    this.mode='local';
  },
  async _initFirebase(){
    const fb=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const fs=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const app=fb.initializeApp(window.FIREBASE_CONFIG);const db=fs.getFirestore(app);
    this.fb={fs,db};
  },
  _ref(coll){return this.fb.fs.doc(this.fb.db,'gdl',COLLS[coll].doc)},

  async read(coll){
    if(this.mode==='claude'){try{const r=await window.storage.get(COLLS[coll].key,true);return r&&r.value?JSON.parse(r.value):{}}catch(e){return {}}}
    if(this.mode==='local'){try{return JSON.parse(localStorage.getItem(COLLS[coll].key)||'{}')}catch(e){return {}}}
    return this._cache[coll]||{};
  },
  async write(coll,map){
    if(this.mode==='firebase'){await this.fb.fs.setDoc(this._ref(coll),{map,ts:Date.now()});this._cache[coll]=map;return}
    if(this.mode==='claude'){await window.storage.set(COLLS[coll].key,JSON.stringify(map),true);this._cache[coll]=map;return}
    localStorage.setItem(COLLS[coll].key,JSON.stringify(map));window.dispatchEvent(new Event('gdl-local-'+coll));this._cache[coll]=map;
  },
  async loadAll(coll){
    if(this.mode==='firebase'){const fs=this.fb.fs,db=this.fb.db;const snap=await fs.getDocs(fs.collection(db,COLLS[coll].coll));const arr=snap.docs.map(x=>x.data());const m={};arr.forEach(o=>{if(o&&o.id)m[o.id]=o});this._cache[coll]=m;return arr}
    const m=await this.read(coll);this._cache[coll]=m;return Object.values(m)
  },
  async saveItem(coll,item){
    if(this.mode==='firebase'){await this.fb.fs.setDoc(this.fb.fs.doc(this.fb.db,COLLS[coll].coll,item.id),item);return}
    const m=await this.read(coll);m[item.id]=item;await this.write(coll,m)
  },
  async deleteItem(coll,id){
    if(this.mode==='firebase'){await this.fb.fs.deleteDoc(this.fb.fs.doc(this.fb.db,COLLS[coll].coll,id));return}
    const m=await this.read(coll);delete m[id];await this.write(coll,m)
  },
  async migrate(coll){
    if(this.mode!=='firebase')return;
    const fs=this.fb.fs,db=this.fb.db;
    try{
      const newSnap=await fs.getDocs(fs.collection(db,COLLS[coll].coll));
      if(!newSnap.empty)return; // già in formato nuovo
      const oldDoc=await fs.getDoc(fs.doc(db,'gdl',COLLS[coll].docOld));
      const data=(oldDoc&&oldDoc.exists&&oldDoc.exists())?oldDoc.data():null;
      const map=data&&data.map?data.map:null;
      if(map){for(const id of Object.keys(map)){const it=map[id]||{};if(!it.id)it.id=id;await fs.setDoc(fs.doc(db,COLLS[coll].coll,it.id),it)}}
    }catch(e){console.warn('Migrazione',coll,e)}
  },

  watch(coll,cb){
    this._watchers[coll]=cb;
    if(this.mode==='firebase'){
      const fs=this.fb.fs,db=this.fb.db;
      fs.onSnapshot(fs.collection(db,COLLS[coll].coll),snap=>{const arr=snap.docs.map(x=>x.data());const m={};arr.forEach(o=>{if(o&&o.id)m[o.id]=o});this._cache[coll]=m;cb(arr)});
    }else if(this.mode==='claude'){
      if(!this._poll){this._last={};
        this._poll=setInterval(async()=>{
          for(const c of Object.keys(this._watchers)){
            const m=await this.read(c);const s=JSON.stringify(m);
            if(s!==this._last[c]){this._last[c]=s;this._cache[c]=m;this._watchers[c](Object.values(m))}
          }
        },4000);
      }
    }else{
      window.addEventListener('gdl-local-'+coll,async()=>cb(await this.loadAll(coll)));
      window.addEventListener('storage',async e=>{if(e.key===COLLS[coll].key)cb(await this.loadAll(coll))});
    }
  },
  async getMeta(){
    if(this.mode!=='firebase')return {};
    try{const fs=this.fb.fs,db=this.fb.db;const d=await fs.getDoc(fs.doc(db,'app','meta'));return (d&&d.exists&&d.exists())?d.data():{}}catch(e){return {}}
  },
  async setMeta(patch){
    if(this.mode!=='firebase')return;
    try{const fs=this.fb.fs,db=this.fb.db;await fs.setDoc(fs.doc(db,'app','meta'),patch,{merge:true})}catch(e){}
  },
  async deleteOld(){
    if(this.mode!=='firebase')return;
    const fs=this.fb.fs,db=this.fb.db;
    for(const c of ['bookings','spese','inventory']){try{await fs.deleteDoc(fs.doc(db,'gdl',COLLS[c].docOld))}catch(e){}}
  },
  async getPref(k){
    if(this.mode==='claude'){try{const r=await window.storage.get('gdl_pref_'+k,false);return r?r.value:null}catch(e){return null}}
    try{return localStorage.getItem('gdl_pref_'+k)}catch(e){return null}
  },
  async setPref(k,v){
    if(this.mode==='claude'){try{await window.storage.set('gdl_pref_'+k,v,false)}catch(e){}return}
    try{localStorage.setItem('gdl_pref_'+k,v)}catch(e){}
  },
};

function qty(b,res){const v=(b.attrezzature||{})[res];if(v===true)return 1;if(v===false)return 0;return Number(v)||0}
function peak(res,a1,a2,status,excludeId){
  let mx=0;const days=eachDay(a1,a2);
  const rel=STATE.bookings.filter(b=>b.id!==excludeId&&(status?b.stato===status:true)&&overlap(b,a1,a2));
  for(const day of days){let s=0;for(const b of rel)if(b.dataInizio<=day&&b.dataFine>=day)s+=qty(b,res);if(s>mx)mx=s}
  return mx;
}
function availability(a1,a2,excludeId){
  const out={};
  for(const res of resKeys()){
    const tot=INV[res].total;
    const conf=peak(res,a1,a2,'confermato',excludeId);
    const pend=peak(res,a1,a2,'da_confermare',excludeId);
    out[res]={total:tot,confermato:conf,attesa:pend,libero:Math.max(0,tot-conf)};
  }
  return out;
}
function checkConfirmable(b){
  const av=availability(b.dataInizio,b.dataFine,b.id);const problemi=[];
  for(const res of resKeys()){const req=qty(b,res);if(!req)continue;
    if(req>av[res].libero)problemi.push({res,richiesti:req,liberi:av[res].libero,gia:av[res].confermato});}
  return problemi;
}

/* ============================================================
   CALENDARIO
   ============================================================ */
function dayLoad(ds){
  let n=0,ratio=0;
  STATE.bookings.forEach(b=>{if(b.dataInizio<=ds&&b.dataFine>=ds)n++});
  resKeys().forEach(res=>{const tot=INV[res].total||1;let s=0;
    STATE.bookings.forEach(b=>{if(b.stato==='confermato'&&b.dataInizio<=ds&&b.dataFine>=ds)s+=qty(b,res)});
    ratio=Math.max(ratio,Math.min(1,s/tot))});
  return {n,ratio};
}
function viewCalendar(){
  const wrap=el('div');
  wrap.appendChild(el('div','vhead',`<div><h1>Calendario</h1><div class="sub">Impegni e prenotazioni</div></div>`));
  const ib=el('div','install-banner');ib.id='install-banner';
  ib.innerHTML=`<div class="it"><b>Installa GDL Services</b><br>Aggiungila alla home per usarla come app.</div><button id="ins-btn">Installa</button><button class="close" id="ins-x">✕</button>`;
  wrap.appendChild(ib);
  const d=STATE.calDate;
  const nav=el('div','cal-nav');nav.innerHTML=`<button id="pm">‹</button><div class="mo">${MESI[d.getMonth()]} ${d.getFullYear()}</div><button id="nm">›</button>`;
  wrap.appendChild(nav);
  const grid=el('div','cal-grid');GIORNI.forEach(g=>grid.appendChild(el('div','cal-dow',g)));
  const first=new Date(d.getFullYear(),d.getMonth(),1);let start=(first.getDay()+6)%7;
  const dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  for(let i=0;i<start;i++)grid.appendChild(el('div','cal-cell out'));
  const tdy=today();
  for(let day=1;day<=dim;day++){
    const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(day)}`;const ld=dayLoad(ds);
    const cell=el('div','cal-cell'+(ds===tdy?' today':''));
    const nc=Math.min(3,STATE.bookings.filter(b=>b.dataInizio<=ds&&b.dataFine>=ds&&b.stato==='confermato').length);
    const np=Math.min(3,STATE.bookings.filter(b=>b.dataInizio<=ds&&b.dataFine>=ds&&b.stato==='da_confermare').length);
    let badges='';for(let i=0;i<nc;i++)badges+='<span class="badge bg-confirm"></span>';for(let i=0;i<np;i++)badges+='<span class="badge bg-pending"></span>';
    cell.innerHTML=`${ld.n>0?`<span class="cnt">${ld.n}</span>`:''}<span class="dn">${day}</span><div class="badges">${badges}</div>`+
      (ld.ratio>0?`<div class="load" style="background:linear-gradient(90deg,var(--confirm) ${ld.ratio*100}%,transparent ${ld.ratio*100}%)"></div>`:'');
    cell.onclick=()=>openDay(ds);grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  wrap.appendChild(el('div','cal-legend','<span><i class="bg-confirm"></i>Confermato</span><span><i class="bg-pending"></i>Da confermare</span>'));
  setTimeout(()=>{
    $('#pm').onclick=()=>{STATE.calDate=new Date(d.getFullYear(),d.getMonth()-1,1);render()};
    $('#nm').onclick=()=>{STATE.calDate=new Date(d.getFullYear(),d.getMonth()+1,1);render()};
    if(STATE._deferredPrompt){ib.classList.add('show');
      $('#ins-btn').onclick=async()=>{STATE._deferredPrompt.prompt();STATE._deferredPrompt=null;ib.classList.remove('show')};
      $('#ins-x').onclick=()=>ib.classList.remove('show');}
  },0);
  return wrap;
}

    row.onclick=()=>openAssetForm(res);dot.appendChild(row)});
  const add=el('button','add-asset','+ Aggiungi asset');add.onclick=()=>openAssetForm();
  dot.appendChild(add);wrap.appendChild(dot);

  setTimeout(()=>{
    $('#dz-a').onchange=e=>{STATE.dz.a=e.target.value;if(STATE.dz.b<STATE.dz.a){STATE.dz.b=STATE.dz.a;$('#dz-b').value=STATE.dz.a}drawAvail()};
    $('#dz-b').onchange=e=>{STATE.dz.b=e.target.value;if(STATE.dz.b<STATE.dz.a){STATE.dz.a=STATE.dz.b;$('#dz-a').value=STATE.dz.b}drawAvail()};

function drawAvail(){
  const c=$('#dz-res');if(!c)return;c.innerHTML='';
  const av=availability(STATE.dz.a,STATE.dz.b,null);
  resKeys().forEach(res=>{const inv=INV[res],a=av[res];
    const cPct=a.total?a.confermato/a.total*100:0,pPct=a.total?a.attesa/a.total*100:0;
    const cls=a.libero===0?'full':(a.libero<=a.total*0.25?'warn':'ok');
    const freeTxt=isToggle(inv)?(a.libero>0?'Libero':'Occupato'):`${a.libero}${inv.unit?' '+inv.unit:''}`;
    const card=el('div','res');
    card.innerHTML=`<div class="res-top"><div class="res-name">${esc(inv.label)}<small>${esc(inv.sub||'')}</small></div><div class="res-free ${cls}">${freeTxt}</div></div>

      <div class="res-legend"><span>Confermato <b>${a.confermato}${isToggle(inv)?'':'/'+a.total}</b></span><span>In attesa <b>${a.attesa}</b></span></div>`;
    c.appendChild(card);
    requestAnimationFrame(()=>{const s=card.querySelectorAll('.seg');s[0].style.width=cPct+'%';s[1].style.width=Math.min(pPct,100-cPct)+'%'});
  });
}
function openAssetForm(existingId){
  const editing=!!existingId;const inv=editing?INV[existingId]:null;
  const draft=editing?Object.assign({},inv):{id:'a'+Date.now()+Math.random().toString(36).slice(2,5),label:'',total:10,unit:'pz',sub:'',icon:DEFAULT_ICON,order:resKeys().length+1};
  let unique=editing?isToggle(inv):false;
  const body=el('div');
  body.innerHTML=`
    <div class="field"><label>Nome asset</label><input class="input" id="a-nome" placeholder="Es. Tavoli pieghevoli" value="${esc(draft.label)}"></div>
    <div class="field"><label>Tipo</label><div class="status-pick" id="a-tipo">
      <div class="opt con ${!unique?'on':''}" data-u="0">Quantità</div>
      <div class="opt con ${unique?'on':''}" data-u="1">Pezzo unico</div></div></div>
    <div class="two" id="a-qtyrow">
      <div class="field"><label>Quantità totale</label><input class="input" type="number" inputmode="numeric" id="a-tot" value="${unique?1:draft.total}"></div>
      <div class="field"><label>Unità</label><input class="input" id="a-unit" placeholder="pz, m, kit…" value="${esc(draft.unit||'')}"></div>
    </div>
    <div class="field"><label>Descrizione breve (facoltativa)</label><input class="input" id="a-sub" placeholder="Note sull'asset" value="${esc(draft.sub||'')}"></div>
    <div id="a-warn"></div>`;
  const foot=el('div','sheet-foot');
  if(editing){const del=el('button','btn btn-danger','🗑');del.onclick=()=>confirmDeleteAsset(existingId,()=>sheet.close());foot.appendChild(del)}
  const save=el('button','btn btn-primary',editing?'Salva':'Aggiungi');foot.appendChild(save);
  const sheet=openSheet(editing?'Modifica asset':'Nuovo asset',body,foot);

  const tipo=body.querySelector('#a-tipo'),qtyrow=body.querySelector('#a-qtyrow'),totI=body.querySelector('#a-tot');
  function applyTipo(){qtyrow.style.display=unique?'none':'flex';if(unique)totI.value=1}
  tipo.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{unique=o.dataset.u==='1';tipo.querySelectorAll('.opt').forEach(x=>x.classList.remove('on'));o.classList.add('on');applyTipo();checkWarn()});
  applyTipo();
  function checkWarn(){
    const w=body.querySelector('#a-warn');const newTot=unique?1:(parseInt(totI.value)||0);
    let maxUse=0;STATE.bookings.filter(b=>b.stato==='confermato').forEach(b=>{maxUse=Math.max(maxUse,qty(b,draft.id))});
    if(editing&&newTot<maxUse){w.innerHTML=`<div class="warn-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><div>Attenzione: alcune prenotazioni confermate usano fino a ${maxUse}. Riducendo a ${newTot} risulteranno in sovra-impegno.</div></div>`}
    else w.innerHTML='';
  }
  totI.oninput=checkWarn;

  save.onclick=async()=>{
    const nome=body.querySelector('#a-nome').value.trim();
    if(!nome){toast('Inserisci il nome dell\'asset');return}
    draft.label=nome;draft.unit=unique?'':body.querySelector('#a-unit').value.trim();
    draft.total=unique?1:Math.max(1,parseInt(totI.value)||1);
    draft.sub=body.querySelector('#a-sub').value.trim();
    delete draft.step;
    await Store.saveItem('inventory',draft);
    INV[draft.id]=draft;
    sheet.close();toast(editing?'Asset aggiornato':'Asset aggiunto');render();
  };
}
function confirmDeleteAsset(id,after){
  const inv=INV[id];const used=STATE.bookings.some(b=>qty(b,id)>0);
  const body=el('div');
  body.innerHTML=`<p style="font-size:15px;line-height:1.5;padding:6px 2px 4px">Eliminare <b>${esc(inv.label)}</b> dalla dotazione?${used?' <br><br><b>Nota:</b> è presente in alcune prenotazioni; quelle resteranno ma non sarà più conteggiato.':''}</p>`;
  const foot=el('div','sheet-foot');
  const no=el('button','btn btn-ghost','Annulla');no.onclick=()=>sheet.close();
  const yes=el('button','btn','Elimina');yes.style.background='var(--danger)';yes.style.color='#fff';
  yes.onclick=async()=>{await Store.deleteItem('inventory',id);delete INV[id];sheet.close();if(after)after();toast('Asset eliminato');render()};
  foot.appendChild(no);foot.appendChild(yes);
  const sheet=openSheet('Conferma eliminazione',body,foot);
}

function spesaCard(s){

  const f=el('div','filters');

function refreshSpese(){
  const c=$('#sp-c');if(!c)return;c.innerHTML='';
  let arr=STATE.spese.filter(s=>{
    if(STATE.spFilter!=='tutte'&&s.stato!==STATE.spFilter)return false;
    if(STATE.spSearch){const q=STATE.spSearch.toLowerCase();if(!((s.descrizione||'').toLowerCase().includes(q)||(s.categoria||'').toLowerCase().includes(q)))return false}
    return true;
  }).sort((a,b)=>a.data<b.data?1:-1);
  if(!arr.length){c.appendChild(emptyState('Nessuna spesa','Tocca + per registrarne una.','🧾'));return}
  arr.forEach(s=>c.appendChild(spesaCard(s)));

    id:'s'+Date.now()+Math.random().toString(36).slice(2,6),descrizione:'',categoria:'',importo:'',data:today(),

function viewSummary(){
  const wrap=el('div');
  wrap.appendChild(el('div','vhead',`<div><h1>Riepilogo</h1><div class="sub">Quadro generale</div></div>`));
  const conf=STATE.bookings.filter(b=>b.stato==='confermato');
  const pend=STATE.bookings.filter(b=>b.stato==='da_confermare');
  const fatt=conf.reduce((s,b)=>s+(Number(b.importo)||0),0);
  const pip=pend.reduce((s,b)=>s+(Number(b.importo)||0),0);
  const futuri=conf.filter(b=>b.dataFine>=today()).length;
  const speseTot=STATE.spese.reduce((a,s)=>a+(Number(s.importo)||0),0);
  const daPagare=STATE.spese.filter(s=>s.stato==='da_pagare').reduce((a,s)=>a+(Number(s.importo)||0),0);
  const daRimb=STATE.spese.filter(s=>s.stato==='da_rimborsare');
  const daRimbTot=daRimb.reduce((a,s)=>a+(Number(s.importo)||0),0);

  const k=el('div','kpis');

    <div class="kpi feat"><div class="k-lab">Fatturato confermato</div><div class="k-val"><span class="cur">€</span>${fatt.toLocaleString('it-IT')}</div><div class="k-sub">${conf.length} prenotazioni confermate</div></div>

  wrap.appendChild(ks);

  wrap.appendChild(el('div','sect-t','Da rimborsare ai soci'));
  const owedKeys=Object.keys(owed);

  else owedKeys.forEach(s=>{const r=el('div','seller-row');
    r.innerHTML=`<div class="dot" style="background:${SOCIO_COLOR[s]||'#888'}">${initials(s)}</div><div class="nm">${s}<div class="ct">anticipi personali</div></div><div class="amt" style="color:var(--reimb)">${euro(owed[s])}</div>`;
    wrap.appendChild(r)});

  const enRecv=STATE.entrate.filter(e=>['incassata','da_versare','versata'].includes(e.stato)).reduce((a,e)=>a+(Number(e.importo)||0),0);
  const enWait=STATE.entrate.filter(e=>e.stato==='da_incassare').reduce((a,e)=>a+(Number(e.importo)||0),0);
  if(STATE.entrate.length){
    wrap.appendChild(el('div','sect-t','Incassi'));
    const ke=el('div','kpis');
    ke.innerHTML=`<div class="kpi"><div class="k-lab">Incassato</div><div class="k-val" style="font-size:21px;color:var(--confirm)">${euro(enRecv)}</div></div>
      <div class="kpi"><div class="k-lab">Ancora da incassare</div><div class="k-val" style="font-size:21px;color:var(--pending)">${euro(enWait)}</div></div>`;
    wrap.appendChild(ke);
  }
  const cash={};STATE.entrate.filter(e=>e.stato==='da_versare').forEach(e=>{const s=e.incassataDa||'—';cash[s]=(cash[s]||0)+(Number(e.importo)||0)});
  const cashKeys=Object.keys(cash);
  if(cashKeys.length){
    wrap.appendChild(el('div','sect-t','Contanti dei soci da versare'));
    cashKeys.forEach(s=>{const r=el('div','seller-row');
      r.innerHTML=`<div class="dot" style="background:${SOCIO_COLOR[s]||'#888'}">${initials(s)}</div><div class="nm">${s}<div class="ct">contanti incassati</div></div><div class="amt" style="color:var(--pending)">${euro(cash[s])}</div>`;
      wrap.appendChild(r)});
  }
  const scad=STATE.documenti.filter(d=>{const i=scadInfo(d.scadenza);return i&&(i.cls==='exp'||i.cls==='soon')}).sort((a,b)=>a.scadenza<b.scadenza?-1:1);
  if(scad.length){
    wrap.appendChild(el('div','sect-t','Documenti in scadenza'));
    scad.forEach(d=>{const i=scadInfo(d.scadenza);const r=el('div','seller-row');
      r.innerHTML=`<div class="dot" style="background:${i.cls==='exp'?'var(--reimb)':'var(--pending)'}">!</div><div class="nm">${esc(d.tipo||'Documento')}${d.descrizione?' — '+esc(d.descrizione):''}<div class="ct">${i.label}</div></div>`;
      wrap.appendChild(r)});
  }

  const next=STATE.bookings.filter(b=>b.dataFine>=today()).sort((a,b)=>a.dataInizio<b.dataInizio?-1:1).slice(0,5);
  wrap.appendChild(el('div','sect-t','Prossimi impegni'));
  if(!next.length)wrap.appendChild(emptyState('Agenda libera','Nessun impegno in programma.','🗓️'));
  else next.forEach(b=>wrap.appendChild(bookingCard(b)));
  return wrap;
}

function openSheet(title,bodyNode,footNode){
  const scrim=el('div','scrim');const sheet=el('div','sheet');
  sheet.innerHTML=`<div class="sheet-grab"></div><div class="sheet-head"><h2>${title}</h2><button class="x">✕</button></div>`;
  const body=el('div','sheet-body');body.appendChild(bodyNode);sheet.appendChild(body);
  if(footNode)sheet.appendChild(footNode);
  scrim.appendChild(sheet);document.body.appendChild(scrim);
  requestAnimationFrame(()=>scrim.classList.add('show'));
  const close=()=>{scrim.classList.remove('show');setTimeout(()=>scrim.remove(),320)};
  sheet.querySelector('.x').onclick=close;scrim.onclick=e=>{if(e.target===scrim)close()};
  return {close,scrim,body};
}

function openDay(ds){

  const body=el('div');const av=availability(ds,ds,null);

  mini.innerHTML=`<label>Disponibilità del giorno</label>`+resKeys().map(res=>{const a=av[res],inv=INV[res];

  body.innerHTML=`

    <div class="field"><label>Venditore</label><div class="seg-pick" id="f-sell"></div></div>
    <div class="two">
      <div class="field"><label>Dal</label><input class="input" type="date" id="f-da" value="${draft.dataInizio}"></div>
      <div class="field"><label>Al</label><input class="input" type="date" id="f-a" value="${draft.dataFine}"></div>
    </div>
    <div class="field"><label>Importo preventivo (€)</label><input class="input" type="number" inputmode="decimal" id="f-imp" placeholder="0" value="${draft.importo}"></div>
    <div class="field"><label>Attrezzature</label><div id="f-eq"></div></div>
    <div id="f-warn"></div>
    <div class="field"><label>Stato</label><div class="status-pick" id="f-stato">
      <div class="opt pen ${draft.stato==='da_confermare'?'on':''}" data-s="da_confermare">Da confermare</div>
      <div class="opt con ${draft.stato==='confermato'?'on':''}" data-s="confermato">Confermato</div></div></div>
    <div class="field"><label>Note</label><textarea class="input" id="f-note" placeholder="Indirizzo, orari, dettagli…">${esc(draft.note)}</textarea></div>`;
  const foot=el('div','sheet-foot');const save=el('button','btn btn-primary',editing?'Salva modifiche':'Crea preventivo');foot.appendChild(save);
  const sheet=openSheet(editing?'Modifica preventivo':'Nuovo preventivo',body,foot);

  const sell=body.querySelector('#f-sell');
  SOCI.forEach(s=>{const o=el('div','opt'+(draft.venditore===s?' on':''));o.innerHTML=`<span class="av" style="background:${SOCIO_COLOR[s]}">${initials(s)}</span>${s}`;
    o.onclick=()=>{draft.venditore=s;sell.querySelectorAll('.opt').forEach(x=>x.classList.remove('on'));o.classList.add('on')};sell.appendChild(o)});

  const eqc=body.querySelector('#f-eq');
  resKeys().forEach(res=>{const inv=INV[res];const row=el('div','eqitem');
    row.innerHTML=`<div class="ei-ic"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${inv.icon||DEFAULT_ICON}"/></svg></div>
      <div class="ei-tx"><div class="nm">${esc(inv.label)}</div><div class="av" id="av-${res}"></div></div>`;
    if(isToggle(inv)){const cur=qty(draft,res)>0;draft.attrezzature[res]=cur;
      const tg=el('div','toggle'+(cur?' on':''));tg.onclick=()=>{draft.attrezzature[res]=!draft.attrezzature[res];tg.classList.toggle('on',draft.attrezzature[res]);updateAvail()};row.appendChild(tg);
    }else{const st=el('div','stepper');
      const minus=el('button',null,'−');
      const val=document.createElement('input');val.className='qv';val.type='number';val.inputMode='numeric';val.min=0;val.max=inv.total;val.value=qty(draft,res);
      const plus=el('button',null,'+');
      const setv=n=>{n=Math.max(0,Math.min(inv.total,Math.round(n)||0));draft.attrezzature[res]=n;val.value=n;updateAvail()};

      val.onblur=()=>setv(parseInt(val.value,10)||0);
      st.appendChild(minus);st.appendChild(val);st.appendChild(plus);row.appendChild(st)}

  a.onchange=e=>{draft.dataFine=e.target.value;if(draft.dataFine<draft.dataInizio){draft.dataInizio=draft.dataFine;da.value=draft.dataFine}updateAvail()};

  function updateAvail(){
    const av=availability(draft.dataInizio,draft.dataFine,draft.id);let block=false;const probs=[];
    resKeys().forEach(res=>{const inv=INV[res],a2=av[res],req=qty(draft,res);const lab=body.querySelector('#av-'+res);if(!lab)return;
      if(isToggle(inv)){const free=a2.libero>0;lab.textContent=free?'Disponibile nel periodo':'Occupato nel periodo';lab.className='av'+((req&&!free)?' bad':'');if(req&&!free){probs.push(inv.label);if(draft.stato==='confermato')block=true}}
      else{lab.textContent=`${a2.libero}${inv.unit?' '+inv.unit:''} liberi su ${inv.total}`;const bad=req>a2.libero;lab.className='av'+(bad?' bad':'');if(bad){probs.push(`${inv.label} (max ${a2.libero})`);if(draft.stato==='confermato')block=true}}});
    const w=body.querySelector('#f-warn');
    if(probs.length){const over=draft.stato==='confermato';
      w.innerHTML=`<div class="warn-box ${over?'':'ok'}" style="${over?'':'background:var(--pending-soft);border-color:#f0dcb0;color:#8a5a12'}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><div>${over?'Non confermabile':'Supera la disponibilità'}: ${probs.join(', ')}.${over?' Riduci le quantità o lascia "da confermare".':' Ok come preventivo, ma non confermabile finché non si libera.'}</div></div>`;
    }else w.innerHTML='';

  }
  setTimeout(updateAvail,0);
  save.onclick=async()=>{
    if(!draft.cliente.trim()){toast('Inserisci il nome del cliente');cli.focus();return}
    if(draft.stato==='confermato'){const prob=checkConfirmable(draft);if(prob.length){const p=prob[0],inv=INV[p.res];toast(`Non confermabile: solo ${p.liberi} ${inv.unit||'pz'} di ${inv.label} liberi`);return}}
    draft.importo=Number(draft.importo)||0;draft.updatedAt=Date.now();
    await Store.saveItem('bookings',draft);sheet.close();toast(editing?'Modifiche salvate':'Preventivo creato');render();
  };
}

/* ============================================================
   FILE HELPERS (upload / compressione / apertura)
   ============================================================ */
function fileToDataURL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})}
function compressImage(dataUrl,maxDim,quality){
  return new Promise(res=>{const img=new Image();img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>maxDim||h>maxDim){if(w>h){h=Math.round(h*maxDim/w);w=maxDim}else{w=Math.round(w*maxDim/h);h=maxDim}}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    try{res(c.toDataURL('image/jpeg',quality))}catch(e){res(dataUrl)}
  };img.onerror=()=>res(dataUrl);img.src=dataUrl;});
}
async function processFile(file,opts){
  opts=opts||{};const maxKB=opts.maxKB||700;
  if((file.type||'').startsWith('image/')){
    const raw=await fileToDataURL(file);
    let out=await compressImage(raw,opts.maxDim||1500,0.72);
    let kb=Math.round(out.length*0.75/1024);
    if(kb>maxKB){out=await compressImage(raw,1000,0.6);kb=Math.round(out.length*0.75/1024)}
    return {name:file.name||'foto.jpg',type:'image/jpeg',dataUrl:out,size:kb*1024};
  }
  const dataUrl=await fileToDataURL(file);
  const kb=Math.round(dataUrl.length*0.75/1024);
  if(kb>maxKB)throw new Error('File troppo grande ('+kb+' KB, max '+maxKB+'). Comprimilo o riducilo.');
  return {name:file.name||'documento',type:file.type||'application/octet-stream',dataUrl,size:kb*1024};
}
function openFileData(f){
  try{const p=f.dataUrl.split(',');const bin=atob(p[1]);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    const blob=new Blob([arr],{type:f.type||'application/octet-stream'});const url=URL.createObjectURL(blob);
    window.open(url,'_blank');setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){const a=document.createElement('a');a.href=f.dataUrl;a.download=f.name||'file';document.body.appendChild(a);a.click();a.remove()}
}
function loadScript(src){return new Promise((res,rej)=>{if(document.querySelector('script[data-x="'+src+'"]'))return res();
  const s=document.createElement('script');s.src=src;s.setAttribute('data-x',src);s.onload=res;s.onerror=rej;document.head.appendChild(s)})}
function filePickerField(label,existing,onPick){
  const wrap=el('div','field');wrap.appendChild(el('label',null,label));
  const box=el('div','file-box');const input=document.createElement('input');
  input.type='file';input.accept='.pdf,image/*';input.style.display='none';
  function renderBox(f){box.innerHTML='';
    if(f){const isImg=(f.type||'').startsWith('image/');
      const prev=el('div','file-prev',isImg?`<img src="${f.dataUrl}">`:`<span>PDF</span>`);
      const meta=el('div','file-meta',`<div class="fn">${esc(f.name||'file')}</div><div class="fs">${Math.round((f.size||0)/1024)} KB</div>`);
      const acts=el('div','file-acts');
      const v=el('button','file-act','Apri');v.onclick=()=>openFileData(f);
      const r=el('button','file-act','Cambia');r.onclick=()=>input.click();
      acts.appendChild(v);acts.appendChild(r);
      box.appendChild(prev);box.appendChild(meta);box.appendChild(acts);
    }else{const b=el('button','file-add','📎 Carica PDF o foto dal dispositivo');b.onclick=()=>input.click();box.appendChild(b)}
  }
  input.onchange=async()=>{const file=input.files[0];if(!file)return;try{const f=await processFile(file);onPick(f);renderBox(f)}catch(e){toast(e.message||'Errore caricamento')}};
  wrap.appendChild(box);wrap.appendChild(input);renderBox(existing);return wrap;
}

function refreshEntrate(){
  const c=$('#en-c');if(!c)return;c.innerHTML='';
  let arr=STATE.entrate.filter(e=>{
    if(STATE.enFilter!=='tutte'&&e.stato!==STATE.enFilter)return false;
    if(STATE.enSearch){const q=STATE.enSearch.toLowerCase();if(!((e.descrizione||'').toLowerCase().includes(q)))return false}
    return true;
  }).sort((a,b)=>a.data<b.data?1:-1);
  if(!arr.length){c.appendChild(emptyState('Nessuna entrata','Tocca + per registrare un incasso.','💶'));return}
  arr.forEach(e=>c.appendChild(entrataCard(e)));
}
function openEntrataDetail(id){

  const body=el('div');body.appendChild(entrataCard(e));
  if(e.note){const n=el('div','card');n.innerHTML=`<div style="font-size:12px;font-weight:800;color:var(--muted);margin-bottom:5px">NOTE</div><div style="font-size:14px;line-height:1.5">${esc(e.note)}</div>`;body.appendChild(n)}
  const meta=el('div','card');meta.innerHTML=`<div style="font-size:12px;color:var(--muted);font-weight:600">Registrata da <b style="color:var(--ink)">${esc(e.createdBy||'—')}</b></div>`;body.appendChild(meta);
  const acts=el('div','det-acts');
  if(e.stato==='da_incassare'){const b=el('button','btn btn-primary','✓ Segna incassata');b.onclick=async()=>{e.stato='incassata';e.updatedAt=Date.now();await Store.saveItem('entrate',e);sheet.close();toast('Incasso registrato');render()};acts.appendChild(b)}
  if(e.stato==='da_versare'){const b=el('button','btn btn-primary','✓ Versata in cassa');b.onclick=async()=>{e.stato='versata';e.updatedAt=Date.now();await Store.saveItem('entrate',e);sheet.close();toast('Versamento registrato');render()};acts.appendChild(b)}
  const ed=el('button','btn btn-ghost','✎ Modifica');ed.onclick=()=>{sheet.close();openEntrataForm(e)};acts.appendChild(ed);
  const del=el('button','btn btn-danger','🗑');del.onclick=()=>{confirmGeneric('Eliminare questa entrata?',async()=>{await Store.deleteItem('entrate',e.id);sheet.close();toast('Entrata eliminata');render()})};acts.appendChild(del);
  body.appendChild(acts);const sheet=openSheet('Dettaglio entrata',body);
}
function openEntrataForm(existing){
  const editing=!!existing;
  const draft=existing?JSON.parse(JSON.stringify(existing)):{
    id:'e'+Date.now()+Math.random().toString(36).slice(2,6),descrizione:'',importo:'',data:today(),
    incassataDa:'Società',stato:'da_incassare',metodo:'Contanti',note:'',createdBy:STATE.me||SOCI[0],createdAt:Date.now()};
  const body=el('div');
  body.innerHTML=`
    <div class="field"><label>Da chi / causale</label><input class="input" id="e-desc" placeholder="Es. Pro Loco Trivento — saldo sagra" value="${esc(draft.descrizione)}"></div>
    <div class="two">
      <div class="field"><label>Importo (€)</label><input class="input" type="number" inputmode="decimal" id="e-imp" placeholder="0" value="${draft.importo}"></div>
      <div class="field"><label>Data</label><input class="input" type="date" id="e-data" value="${draft.data}"></div>
    </div>
    <div class="field"><label>Metodo</label><div class="filters" id="e-met" style="margin-bottom:0"></div></div>
    <div class="field"><label>Incassata da</label><div class="seg-pick" id="e-pag"></div></div>
    <div class="field"><label>Stato</label><div class="status-pick" id="e-stato"></div></div>
    <div class="field"><label>Note</label><textarea class="input" id="e-note" placeholder="Dettagli…">${esc(draft.note)}</textarea></div>`;
  const foot=el('div','sheet-foot');const save=el('button','btn btn-primary',editing?'Salva':'Registra entrata');foot.appendChild(save);
  const sheet=openSheet(editing?'Modifica entrata':'Nuova entrata',body,foot);
  const metc=body.querySelector('#e-met');
  METODI.forEach(m=>{const ch=el('div','chip'+(draft.metodo===m?' on':''),m);ch.onclick=()=>{draft.metodo=m;metc.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));ch.classList.add('on')};metc.appendChild(ch)});
  const pagc=body.querySelector('#e-pag');
  function buildStato(){const sc=body.querySelector('#e-stato');sc.innerHTML='';const opts=statiPerIncasso(draft.incassataDa);
    if(!opts.includes(draft.stato))draft.stato=opts[0];
    opts.forEach(st=>{const cls=(st==='incassata'||st==='versata')?'con':(st==='da_versare'?'rmb':'pen');
      const o=el('div','opt '+cls+(draft.stato===st?' on':''),ENTRATA_STATO[st]);
      o.onclick=()=>{draft.stato=st;sc.querySelectorAll('.opt').forEach(x=>x.classList.remove('on'));o.classList.add('on')};sc.appendChild(o)})}
  ['Società',...SOCI].forEach(p=>{const o=el('div','opt'+(draft.incassataDa===p?' on':''));
    o.innerHTML=p==='Società'?`🏦 Cassa societaria`:`<span class="av" style="background:${SOCIO_COLOR[p]}">${initials(p)}</span>${p}`;
    o.onclick=()=>{draft.incassataDa=p;pagc.querySelectorAll('.opt').forEach(x=>x.classList.remove('on'));o.classList.add('on');buildStato()};pagc.appendChild(o)});
  buildStato();
  body.querySelector('#e-desc').oninput=ev=>draft.descrizione=ev.target.value;
  body.querySelector('#e-imp').oninput=ev=>draft.importo=ev.target.value;
  body.querySelector('#e-data').onchange=ev=>draft.data=ev.target.value;
  body.querySelector('#e-note').oninput=ev=>draft.note=ev.target.value;
  save.onclick=async()=>{if(!draft.descrizione.trim()){toast('Inserisci da chi / causale');return}
    draft.importo=Number(draft.importo)||0;draft.updatedAt=Date.now();await Store.saveItem('entrate',draft);sheet.close();toast(editing?'Entrata salvata':'Entrata registrata');render()};
}

function defaultVehicle(){
  return {id:'mezzo_master',nome:'Iveco Daily',modello:'Cassonato 35 q.li',targa:'',note:'Furgone aziendale GDL Services'+String.fromCharCode(10)+'(cabina + cassone, spoiler tetto)',createdAt:Date.now()};

function vanSVG(mezzoId){
  const spots=[
    {c:'carrozzeria',l:3,t:4,w:37,h:67},
    {c:'elettrico',l:40,t:30,w:27,h:42},
    {c:'motore',l:67,t:49,w:32,h:34},
    {c:'luci',l:69,t:58,w:12,h:12},
    {c:'pneumatici',l:49,t:78,w:20,h:21},
    {c:'pneumatici',l:7,t:70,w:13,h:16},
  ];
  const icon=id=>{const x=COMPONENTI.find(k=>k.id===id);return x?x.icon:''};
  return `<div class="vehicle"><img class="veh-img" src="${VAN_IMG}" alt="Iveco Daily">`+
    spots.map(s=>`<button class="van-part hot" data-comp="${s.c}" style="left:${s.l}%;top:${s.t}%;width:${s.w}%;height:${s.h}%"><span class="pin"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${icon(s.c)}"/></svg></span></button>`).join('')+
    `</div>`;
}
function viewMezzi(){
  const wrap=el('div');
  wrap.appendChild(subHead('Mezzi','Furgoni e manutenzioni'));
  if(!STATE.mezzi.length){
    const e=emptyState('Nessun mezzo','Aggiungi il furgone per tracciare le manutenzioni.','🚐');
    const b=el('button','btn btn-primary','+ Aggiungi mezzo');b.style.maxWidth='240px';b.style.margin='6px auto 0';b.onclick=()=>openMezzoForm();
    e.appendChild(b);wrap.appendChild(e);return wrap;
  }
  if(!STATE.mezzoSel||!STATE.mezzi.find(m=>m.id===STATE.mezzoSel))STATE.mezzoSel=STATE.mezzi[0].id;
  if(STATE.mezzi.length>1){const f=el('div','filters');
    STATE.mezzi.forEach(m=>{const ch=el('div','chip'+(STATE.mezzoSel===m.id?' on':''),esc(m.nome||'Mezzo'));ch.onclick=()=>{STATE.mezzoSel=m.id;render()};f.appendChild(ch)});wrap.appendChild(f)}
  const mezzo=STATE.mezzi.find(m=>m.id===STATE.mezzoSel);
  const head=el('div','card');
  head.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
    <div><div class="bk-cliente">${esc(mezzo.nome)||'Mezzo'}</div>
    <div class="bk-meta">${mezzo.targa?`<span class="tag date">🔖 ${esc(mezzo.targa)}</span>`:''}${mezzo.modello?`<span class="tag sell">${esc(mezzo.modello)}</span>`:''}</div></div>
    <button class="file-act" id="m-edit">Modifica</button></div>`;
  wrap.appendChild(head);
  const van=el('div','van-wrap',vanSVG(mezzo.id));
  wrap.appendChild(van);
  wrap.appendChild(el('div','hint','Tocca una parte del furgone o un componente qui sotto per vedere e aggiungere gli interventi.'));
  const grid=el('div','comp-grid');
  COMPONENTI.forEach(comp=>{const ints=STATE.manutenzioni.filter(x=>x.mezzoId===mezzo.id&&x.componente===comp.id);
    const last=ints.sort((a,b)=>a.data<b.data?1:-1)[0];
    const card=el('button','comp-card');
    card.innerHTML=`<div class="cc-ic"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="${comp.icon}"/></svg></div>
      <div class="cc-l">${comp.label}</div><div class="cc-s">${ints.length?ints.length+' int. · '+fmtDay(last.data):'—'}</div>`;
    card.onclick=()=>openComponente(mezzo.id,comp.id);grid.appendChild(card)});
  wrap.appendChild(grid);
  setTimeout(()=>{
    head.querySelector('#m-edit').onclick=()=>openMezzoForm(mezzo);
    van.querySelectorAll('.van-part').forEach(p=>p.onclick=()=>openComponente(mezzo.id,p.getAttribute('data-comp')));
  },0);
  return wrap;
}
function openComponente(mezzoId,compId){

function scadInfo(d){
  if(!d)return null;
  const diff=Math.round((parse(d)-parse(today()))/86400000);
  if(diff<0)return {label:'Scaduto',cls:'exp'};
  if(diff<=30)return {label:'Scade tra '+diff+'gg',cls:'soon'};
  return {label:'Scade il '+fmtDay(d),cls:'ok'};
}
function docCard(d){
  const c=el('div','card');const sc=scadInfo(d.scadenza);
  const mezzo=d.mezzoId?STATE.mezzi.find(m=>m.id===d.mezzoId):null;
  c.innerHTML=`<div style="display:flex;gap:12px;align-items:center">
    <div class="doc-ic">${(d.file&&(d.file.type||'').startsWith('image/'))?`<img src="${d.file.dataUrl}">`:`<span>${d.file?'PDF':'—'}</span>`}</div>
    <div style="flex:1;min-width:0">
      <div class="bk-cliente" style="font-size:15px">${esc(d.descrizione)||d.tipo}</div>
      <div class="bk-meta"><span class="tag sell">${esc(d.tipo)}</span>${mezzo?`<span class="tag cat">🚐 ${esc(mezzo.nome)}</span>`:''}${sc?`<span class="scad ${sc.cls}">${sc.label}</span>`:''}</div>
    </div></div>`;
  c.onclick=()=>openDocDetail(d.id);return c;
}
function viewDocumenti(){
  const wrap=el('div');
  wrap.appendChild(subHead('Documenti',`${STATE.documenti.length} archiviati`));
  const f=el('div','filters');
  [['tutti','Tutti'],...DOC_TIPI.map(t=>[t,t])].forEach(([k,l])=>{const ch=el('div','chip'+(STATE.docFilter===k?' on':''),l);ch.onclick=()=>{STATE.docFilter=k;f.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));ch.classList.add('on');refreshDoc()};f.appendChild(ch)});
  wrap.appendChild(f);
  const lc=el('div');lc.id='doc-c';wrap.appendChild(lc);setTimeout(refreshDoc,0);return wrap;
}
function refreshDoc(){
  const c=$('#doc-c');if(!c)return;c.innerHTML='';
  let arr=STATE.documenti.filter(d=>STATE.docFilter==='tutti'||d.tipo===STATE.docFilter);
  arr.sort((a,b)=>{if(a.scadenza&&b.scadenza)return a.scadenza<b.scadenza?-1:1;if(a.scadenza)return -1;if(b.scadenza)return 1;return 0});
  if(!arr.length){c.appendChild(emptyState('Nessun documento','Tocca + per caricare assicurazione, bollo, ecc.','📄'));return}
  arr.forEach(d=>c.appendChild(docCard(d)));
}

}

function openFirma(id,cb){
  const c=STATE.contratti.find(x=>x.id===id);if(!c)return;

  body.innerHTML=`<div style="font-size:13px;color:var(--muted);margin-bottom:8px">Firma qui sotto con il dito.</div><div class="sig-wrap"><canvas id="sig" class="sig-canvas"></canvas></div>`;

  foot.appendChild(clr);foot.appendChild(sv);
  const sheet=openSheet('Firma cliente',body,foot);
  setTimeout(()=>{const canvas=body.querySelector('#sig');const rect=canvas.getBoundingClientRect();
    canvas.width=rect.width*2;canvas.height=rect.height*2;const ctx=canvas.getContext('2d');ctx.scale(2,2);
    ctx.lineWidth=2.4;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#0B1F3A';
    let drawing=false,last=null,dirty=false;
    const pos=e=>{const r=canvas.getBoundingClientRect();const t=e.touches&&e.touches[0]?e.touches[0]:e;return {x:t.clientX-r.left,y:t.clientY-r.top}};
    const start=e=>{drawing=true;last=pos(e);e.preventDefault()};
    const move=e=>{if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;dirty=true;e.preventDefault()};
    const stop=()=>{drawing=false};
    canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);window.addEventListener('mouseup',stop);
    canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',stop);
    clr.onclick=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);dirty=false};
    sv.onclick=async()=>{if(!dirty){toast('Firma prima di salvare');return}c.firma=canvas.toDataURL('image/png');c.stato='firmato';c.updatedAt=Date.now();await Store.saveItem('contratti',c);sheet.close();toast('Firma salvata');if(cb)cb();render()};
  },60);
}

async function buildContrattoPDF(c,opts){
  opts=opts||{};const blank=!!opts.blank;
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});
  const M=16,W=210-2*M,BOT=282;let y=16;const mdl=MODELLO(c.modello);
  const bl_=v=>blank?'________________':(v&&String(v).trim()?String(v):'________________');
  function ensure(h){if(y+h>BOT){doc.addPage();y=16}}
  function para(txt,size,style,gray){doc.setFont('helvetica',style||'normal');doc.setFontSize(size||8.6);doc.setTextColor(gray==null?55:gray);
    doc.splitTextToSize(txt,W).forEach(l=>{ensure(4.4);doc.text(l,M,y);y+=4.4});}
  function h1(n,t){ensure(8);doc.setFont('helvetica','bold');doc.setFontSize(10.3);doc.setTextColor(11,31,58);doc.text(n+'. '+t,M,y);y+=5.2}
  function bullets(arr){doc.setFont('helvetica','normal');doc.setFontSize(8.6);doc.setTextColor(55);
    arr.forEach(it=>{const ls=doc.splitTextToSize('•  '+it,W-2);ls.forEach((l,i)=>{ensure(4.3);doc.text(l,M+(i?3:0),y);y+=4.3})})}
  // header
  doc.setFont('helvetica','bold');doc.setFontSize(14.5);doc.setTextColor(11,31,58);
  doc.splitTextToSize('CONTRATTO DI NOLEGGIO — '+mdl.bene.toUpperCase(),W).forEach(l=>{doc.text(l,M,y);y+=6.4});
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(120);doc.text('Modello di noleggio senza operatore · beni mobili per eventi',M,y);y+=3.5;
  doc.setDrawColor(224,169,46);doc.setLineWidth(0.7);doc.line(M,y,210-M,y);y+=6.5;
  // 1 parti
  h1(1,'Parti del contratto');
  doc.setFont('helvetica','bold');doc.setFontSize(8.3);doc.setTextColor(40);doc.text('NOLEGGIATORE / LOCATORE',M,y);y+=4.2;doc.setFont('helvetica','normal');
  [AZIENDA.nome,'Sede legale: '+AZIENDA.sedeLegale,'Unità operativa: '+AZIENDA.sedeOp,'C.F./P.IVA: '+AZIENDA.piva+'    REA: '+AZIENDA.rea,'PEC: '+AZIENDA.pec,'Legale rappr.: '+AZIENDA.rappr].forEach(t=>{ensure(4);doc.text(t,M,y);y+=4});
  y+=1.5;doc.setFont('helvetica','bold');doc.text('CLIENTE / NOLEGGIATORE',M,y);y+=4.2;doc.setFont('helvetica','normal');
  [['Nome/Ragione sociale',c.cliente],['C.F./P.IVA',c.cf],['Nato/a a … il … / Sede',c.natoA],['Indirizzo',c.indirizzo],['Documento identità n.',c.docId],['Telefono',c.telefono],['Email/PEC',c.email],['Referente ritiro/consegna',c.referente]].forEach(([k,v])=>{const ls=doc.splitTextToSize(k+': '+bl_(v),W);ls.forEach(l=>{ensure(4.3);doc.text(l,M,y);y+=4.3})});
  y+=2;
  // 2 scheda
  h1(2,'Scheda del noleggio');doc.setFontSize(8.6);
  [['Bene noleggiato',mdl.bene],['Quantità / composizione',(c.attrezzatureText&&c.attrezzatureText.trim())?c.attrezzatureText.replace(/\n/g,'; '):(mdl.comp||'')],['Luogo di utilizzo',c.luogo],['Consegna (data/ora/luogo)',c.dataInizio?fmtDay(c.dataInizio):''],['Riconsegna (data/ora/luogo)',c.dataFine?fmtDay(c.dataFine):''],['Canone di noleggio',(c.importo?euro(c.importo):'')+'  (Rif. preventivo/ordine n. _____)'],['Cauzione / deposito',''],['Trasporto / posa / ritiro','A carico di: GDL / Cliente — costo Euro ______'],['Stato iniziale','buono / funzionante / usato ma integro — note: ______']].forEach(([k,v])=>{
    doc.setFont('helvetica','bold');doc.setTextColor(40);ensure(5);doc.text(k,M,y);doc.setFont('helvetica','normal');
    const vv=(v&&String(v).trim())?String(v):(blank?'________________':'________________');const ls=doc.splitTextToSize(vv,W-54);
    ls.forEach((l,i)=>{if(i)ensure(4.2);doc.text(l,M+54,y);if(i<ls.length-1)y+=4.2});y+=5});
  y+=2;
  // 3..11
  C_SEZIONI.forEach(s=>{h1(s.n,s.t);
    if(s.p)s.p.forEach(p=>{para(p);y+=1.4});
    if(s.b){let arr=s.b.slice();if(s.bModel&&mdl.obblighi&&mdl.obblighi.length)arr=arr.concat(mdl.obblighi);bullets(arr);y+=1.4}
  });
  // 12 penali
  h1(12,'Tabella penali, indennizzi e costi di ripristino');
  para('Importi applicati salvo diversa pattuizione scritta, salvo preventivo di riparazione/sostituzione superiore e salvo il maggior danno documentato.',8,'italic',95);y+=2;
  const pen=(mdl.penali&&mdl.penali.length)?mdl.penali:[['Vedi condizioni generali','—','Modello generico: si applicano le condizioni standard.']];
  const x1=M,x2=M+W*0.45,x3=M+W*0.72,w1=W*0.43,w2=W*0.26,w3=W*0.28;
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(11,31,58);ensure(6);
  doc.text('Evento',x1,y);doc.text('Importo',x2,y);doc.text('Note',x3,y);y+=1.6;doc.setDrawColor(210);doc.line(M,y,210-M,y);y+=3.4;
  doc.setFont('helvetica','normal');doc.setTextColor(45);doc.setFontSize(7.8);
  pen.forEach(r=>{const l1=doc.splitTextToSize(r[0],w1-2),l2=doc.splitTextToSize(r[1],w2-2),l3=doc.splitTextToSize(r[2],w3-2);
    const rows=Math.max(l1.length,l2.length,l3.length),rh=rows*3.7+2.2;ensure(rh);
    for(let i=0;i<rows;i++){const yy=y+i*3.7;if(l1[i])doc.text(l1[i],x1,yy);if(l2[i])doc.text(l2[i],x2,yy);if(l3[i])doc.text(l3[i],x3,yy)}
    y+=rh;doc.setDrawColor(233);doc.line(M,y-1.6,210-M,y-1.6)});
  y+=3;
  // 13 sottoscrizione
  h1(13,'Sottoscrizione');doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(45);ensure(8);
  doc.text('Luogo __________________________, data '+(c.dataInizio?fmtDay(c.dataInizio):'____ / ____ / ______'),M,y);y+=12;
  ensure(34);doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(40);
  doc.text('Per GDL SERVICES SRLS',M,y);doc.text('Il Cliente / Noleggiatore',M+W/2+6,y);y+=3;
  if(c.firma){try{doc.addImage(c.firma,'PNG',M+W/2+6,y,52,18)}catch(e){}}
  y+=20;doc.setDrawColor(120);doc.setLineWidth(0.4);doc.line(M,y,M+62,y);doc.line(M+W/2+6,y,M+W/2+68,y);
  // allegati (foto contratto firmato / documento) come pagine finali
  if(!blank&&c.id&&typeof STATE!=='undefined'){
    const imgs=STATE.allegati.filter(a=>a.contrattoId===c.id&&(a.type||'').startsWith('image/'));
    imgs.forEach(a=>{doc.addPage();let yy=16;
      doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(11,31,58);doc.text('Allegato — '+(a.tipo||'documento'),M,yy);yy+=5.5;
      doc.setDrawColor(224,169,46);doc.setLineWidth(0.6);doc.line(M,yy,210-M,yy);yy+=6;
      try{const pr=doc.getImageProperties(a.dataUrl);const maxW=W,maxH=297-yy-16;let w=maxW,h=w*pr.height/pr.width;if(h>maxH){h=maxH;w=h*pr.width/pr.height}
        const x=M+(W-w)/2;doc.addImage(a.dataUrl,(a.dataUrl.indexOf('image/png')>-1?'PNG':'JPEG'),x,yy,w,h);
      }catch(e){doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(120);doc.text('(immagine non incorporabile)',M,yy+6)}
    });
  }
  // footer
  const N=doc.getNumberOfPages();
  for(let i=1;i<=N;i++){doc.setPage(i);doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(150);
    doc.text('GDL SERVICES SRLS — modello contrattuale editabile · completare e verificare i campi prima della firma',M,290);
    doc.text(i+'/'+N,210-M,290,{align:'right'})}
  return doc;
}
