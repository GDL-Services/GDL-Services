<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B1F3A">
<meta name="description" content="Gestione noleggi attrezzature per eventi — GDL Services">
<title>GDL Services · Gestione Noleggi</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy-900:#0B1F3A; --navy-800:#102844; --navy-700:#16345A; --navy-600:#1E436F;
  --gold:#E0A92E; --gold-soft:#F2C94C; --gold-deep:#C8901C;
  --paper:#F6F4EE; --paper-2:#EEEBE2; --surface:#FFFFFF;
  --ink:#16223A; --muted:#6B7689; --line:#E4E1D8;
  --confirm:#179E72; --confirm-soft:#E2F4EC;
  --pending:#D7942A; --pending-soft:#FBF0DC;
  --reimb:#EA7A1C; --reimb-soft:#FBEAD9;
  --danger:#D44A4A; --danger-soft:#FBE7E7;
  --shadow:0 10px 30px -12px rgba(11,31,58,.28);
  --shadow-sm:0 2px 8px -2px rgba(11,31,58,.16);
  --r:18px; --r-sm:12px;
  --display:'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --body:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--body);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;overflow:hidden;position:fixed;inset:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
.app{display:flex;flex-direction:column;height:100%;max-width:720px;margin:0 auto;background:var(--paper);position:relative;overflow:hidden}

.topbar{background:linear-gradient(160deg,var(--navy-900),var(--navy-700));color:#fff;
  padding:calc(14px + env(safe-area-inset-top,0px)) 18px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  box-shadow:0 6px 22px -10px rgba(11,31,58,.6);z-index:5;flex-shrink:0}
.brand{display:flex;align-items:center;gap:11px}
.logo-plate{background:#fff;border-radius:13px;padding:8px 13px;display:flex;align-items:center;
  box-shadow:0 4px 14px -6px rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.5)}
.logo-plate img{height:32px;width:auto;display:block}
.whoami{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:7px 11px;border-radius:999px;font-weight:700;font-size:13px}
.whoami .dot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800;font-family:var(--display)}
.whoami .chev{opacity:.6;font-size:11px}
.sync-pill{font-size:10.5px;font-weight:700;letter-spacing:.4px;display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.72)}
.sync-pill .led{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 3px rgba(224,169,46,.2)}
.sync-pill.cloud .led{background:#41d6a3;box-shadow:0 0 0 3px rgba(65,214,163,.2)}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:18px 16px 122px}
.view{animation:rise .32s cubic-bezier(.2,.7,.3,1)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.vhead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px}
.vhead h1{font-family:var(--display);font-size:25px;font-weight:800;letter-spacing:-.7px}
.vhead .sub{color:var(--muted);font-size:13px;font-weight:500;margin-top:3px}

/* calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav .mo{font-family:var(--display);font-weight:700;font-size:18px;text-transform:capitalize}
.cal-nav button{width:38px;height:38px;border-radius:11px;background:var(--surface);box-shadow:var(--shadow-sm);display:grid;place-items:center;font-size:17px;color:var(--navy-700);transition:.15s}
.cal-nav button:active{transform:scale(.92)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow{text-align:center;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding-bottom:4px}
.cal-cell{aspect-ratio:1/1.08;border-radius:13px;background:var(--surface);padding:6px 0 0;position:relative;display:flex;flex-direction:column;align-items:center;box-shadow:var(--shadow-sm);transition:transform .12s;overflow:hidden}
.cal-cell:active{transform:scale(.94)}
.cal-cell.out{background:transparent;box-shadow:none;pointer-events:none}
.cal-cell.today{outline:2px solid var(--gold)}
.cal-cell .dn{font-weight:700;font-size:14px;font-family:var(--display)}
.cal-cell.today .dn{color:var(--gold-deep)}
.cal-cell .load{position:absolute;left:0;right:0;bottom:0;height:5px}
.cal-cell .badges{display:flex;gap:3px;margin-top:auto;margin-bottom:8px;flex-wrap:wrap;justify-content:center;padding:0 3px}
.cal-cell .badge{width:7px;height:7px;border-radius:50%}
.bg-confirm{background:var(--confirm)} .bg-pending{background:var(--pending)}
.cal-cell .cnt{position:absolute;top:5px;right:6px;font-size:9px;font-weight:800;color:#fff;background:var(--navy-700);min-width:15px;height:15px;border-radius:8px;display:grid;place-items:center;padding:0 3px}
.cal-legend{display:flex;gap:16px;justify-content:center;margin-top:14px;font-size:12px;color:var(--muted);font-weight:600}
.cal-legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}

/* cards */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:15px 16px;margin-bottom:11px;position:relative;overflow:hidden}
.bk{display:flex;gap:13px;align-items:stretch}
.bk .rail{width:4px;border-radius:4px;flex-shrink:0}
.bk.s-confermato .rail,.bk.s-pagata .rail,.bk.s-rimborsata .rail{background:var(--confirm)}
.bk.s-da_confermare .rail,.bk.s-da_pagare .rail{background:var(--pending)}
.bk.s-da_rimborsare .rail{background:var(--reimb)}
.bk-main{flex:1;min-width:0}
.bk-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.bk-cliente{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:-.3px}
.bk-importo{font-family:var(--display);font-weight:800;font-size:16px;white-space:nowrap;color:var(--navy-800)}
.bk-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center}
.tag{font-size:11px;font-weight:700;padding:4px 9px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.tag.date{background:var(--paper-2);color:var(--ink)}
.tag.sell{background:#EAF0FA;color:var(--navy-700)}
.tag.pay{background:#EEF2F7;color:var(--navy-700)}
.tag.cat{background:var(--paper-2);color:var(--muted)}
.status-chip{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;letter-spacing:.2px}
.status-chip.confermato,.status-chip.pagata,.status-chip.rimborsata{background:var(--confirm-soft);color:var(--confirm)}
.status-chip.da_confermare,.status-chip.da_pagare{background:var(--pending-soft);color:var(--pending)}
.status-chip.da_rimborsare{background:var(--reimb-soft);color:var(--reimb)}
.bk-eq{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.eq-chip{font-size:11px;font-weight:600;color:var(--muted);background:var(--paper);border:1px solid var(--line);padding:3px 8px;border-radius:7px;display:inline-flex;align-items:center;gap:4px}
.eq-chip b{color:var(--ink);font-weight:800}

.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty .ico{width:64px;height:64px;border-radius:20px;background:var(--surface);box-shadow:var(--shadow-sm);display:grid;place-items:center;margin:0 auto 14px;font-size:28px}
.empty h3{font-family:var(--display);color:var(--ink);font-size:17px;margin-bottom:6px}
.empty p{font-size:13.5px;line-height:1.5}

.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 14px;border-radius:999px;background:var(--surface);box-shadow:var(--shadow-sm);font-size:13px;font-weight:700;color:var(--muted);transition:.15s}
.chip.on{background:var(--navy-800);color:#fff}
.search{width:100%;padding:12px 14px;border-radius:13px;border:1px solid var(--line);background:var(--surface);margin-bottom:14px;font-weight:500;box-shadow:var(--shadow-sm)}
.search:focus{outline:2px solid var(--gold);border-color:transparent}

/* magazzino / availability */
.dz{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:14px 16px;margin-bottom:16px}
.dz label{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px}
.dz-row{display:flex;gap:10px}.dz-row .f{flex:1}
.dz input[type=date]{width:100%;padding:11px 12px;border-radius:11px;border:1px solid var(--line);background:var(--paper)}
.res{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:15px 16px;margin-bottom:11px}
.res-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
.res-name{font-family:var(--display);font-weight:700;font-size:15px}
.res-name small{display:block;font-family:var(--body);font-weight:500;font-size:11px;color:var(--muted);letter-spacing:0}
.res-free{font-family:var(--display);font-weight:800;font-size:15px}
.res-free.ok{color:var(--confirm)} .res-free.warn{color:var(--pending)} .res-free.full{color:var(--danger)}
.bar{height:11px;border-radius:6px;background:var(--paper-2);overflow:hidden;display:flex}
.bar .seg{height:100%;transition:width .6s cubic-bezier(.2,.7,.3,1)}
.bar .seg.c{background:var(--confirm)} .bar .seg.p{background:var(--pending);opacity:.65}
.res-legend{display:flex;justify-content:space-between;margin-top:8px;font-size:11.5px;font-weight:600;color:var(--muted)}
.res-legend b{color:var(--ink)}

.asset-row{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow-sm);padding:12px 14px;margin-bottom:9px;transition:transform .12s}
.asset-row:active{transform:scale(.98)}
.asset-row .ic{width:38px;height:38px;border-radius:11px;background:var(--paper);display:grid;place-items:center;color:var(--navy-700);flex-shrink:0}
.asset-row .tx{flex:1;min-width:0}.asset-row .tx .nm{font-weight:700}
.asset-row .tx .meta{font-size:12px;color:var(--muted);font-weight:600;margin-top:1px}
.asset-row .tot{font-family:var(--display);font-weight:800;font-size:17px}
.asset-row .edit{color:var(--muted);font-size:16px;padding-left:6px}
.add-asset{width:100%;border:1.5px dashed var(--line);background:transparent;border-radius:14px;padding:15px;font-weight:800;color:var(--navy-700);font-family:var(--display);transition:.15s}
.add-asset:active{background:var(--paper-2)}

/* KPIs */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:8px}
.kpi{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:15px 16px}
.kpi.feat{grid-column:1/-1;background:linear-gradient(150deg,var(--navy-900),var(--navy-700));color:#fff}
.kpi.wide{grid-column:1/-1}
.kpi .k-lab{font-size:11.5px;font-weight:700;color:var(--muted);letter-spacing:.3px}
.kpi.feat .k-lab{color:rgba(255,255,255,.6)}
.kpi .k-val{font-family:var(--display);font-weight:800;font-size:24px;margin-top:6px;letter-spacing:-1px}
.kpi.feat .k-val{font-size:32px}
.kpi .k-val .cur{font-size:15px;opacity:.6;margin-right:2px}
.kpi .k-sub{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:600}
.kpi.feat .k-sub{color:var(--gold-soft)}
.sect-t{font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:.2px;margin:20px 2px 11px;text-transform:uppercase;color:var(--muted)}
.seller-row{display:flex;align-items:center;gap:11px;background:var(--surface);border-radius:14px;box-shadow:var(--shadow-sm);padding:11px 13px;margin-bottom:8px}
.seller-row .dot{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;font-family:var(--display);flex-shrink:0}
.seller-row .nm{font-weight:700;flex:1}
.seller-row .ct{font-size:12px;color:var(--muted);font-weight:600}
.seller-row .amt{font-family:var(--display);font-weight:800}

/* tabbar + fab */
.tabbar{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;padding:7px 4px calc(7px + var(--safe-b));z-index:8}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;color:var(--muted);border-radius:12px;transition:.15s}
.tab svg{width:21px;height:21px}
.tab span{font-size:9.5px;font-weight:700;letter-spacing:.1px}
.tab.on{color:var(--navy-800)}
.tab.on svg{stroke:var(--gold);color:var(--gold)}
.fab{position:absolute;right:18px;bottom:calc(80px + var(--safe-b));width:60px;height:60px;border-radius:20px;background:linear-gradient(150deg,var(--gold-soft),var(--gold-deep));color:#1a1300;display:grid;place-items:center;box-shadow:0 12px 26px -8px rgba(200,144,28,.65);z-index:9;transition:transform .16s}
.fab:active{transform:scale(.9) rotate(90deg)}
.fab svg{width:28px;height:28px}

/* sheet */
.scrim{position:fixed;inset:0;background:rgba(11,31,58,.5);backdrop-filter:blur(3px);z-index:50;opacity:0;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center}
.scrim.show{opacity:1}
.sheet{background:var(--paper);width:100%;max-width:720px;max-height:92vh;border-radius:26px 26px 0 0;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s cubic-bezier(.2,.8,.25,1);overflow:hidden}
.scrim.show .sheet{transform:none}
.sheet-grab{width:40px;height:4px;border-radius:3px;background:var(--line);margin:10px auto 0}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 12px}
.sheet-head h2{font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:-.4px}
.sheet-head .x{width:34px;height:34px;border-radius:50%;background:var(--paper-2);display:grid;place-items:center;font-size:17px;color:var(--muted)}
.sheet-body{overflow-y:auto;padding:4px 18px 18px;flex:1}
.field{margin-bottom:15px}
.field>label{font-size:12px;font-weight:800;letter-spacing:.3px;color:var(--navy-700);display:block;margin-bottom:7px}
.input{width:100%;padding:13px 14px;border-radius:13px;border:1px solid var(--line);background:var(--surface);font-weight:500;transition:.15s}
.input:focus{outline:2px solid var(--gold);border-color:transparent}
textarea.input{resize:none;min-height:62px}
.two{display:flex;gap:11px}.two>*{flex:1}
.seg-pick{display:flex;gap:7px;flex-wrap:wrap}
.seg-pick .opt{flex:1;min-width:calc(50% - 4px);padding:11px;border-radius:12px;border:1.5px solid var(--line);background:var(--surface);font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px;transition:.15s}
.seg-pick .opt .av{margin-left:auto;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:800;font-family:var(--display)}
.seg-pick .opt.on{border-color:var(--navy-800);background:var(--navy-800);color:#fff}
.status-pick{display:flex;gap:9px;flex-wrap:wrap}
.status-pick .opt{flex:1;min-width:calc(50% - 5px);padding:12px;border-radius:13px;border:1.5px solid var(--line);text-align:center;font-weight:800;font-size:13.5px;background:var(--surface);transition:.15s}
.status-pick .opt.on.pen{border-color:var(--pending);background:var(--pending-soft);color:var(--pending)}
.status-pick .opt.on.con{border-color:var(--confirm);background:var(--confirm-soft);color:var(--confirm)}
.status-pick .opt.on.rmb{border-color:var(--reimb);background:var(--reimb-soft);color:var(--reimb)}

.eqitem{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:9px}
.eqitem .ei-ic{width:34px;height:34px;border-radius:10px;background:var(--paper);display:grid;place-items:center;flex-shrink:0;color:var(--navy-700)}
.eqitem .ei-tx{flex:1;min-width:0}.eqitem .ei-tx .nm{font-weight:700;font-size:14px}
.eqitem .ei-tx .av{font-size:11px;font-weight:600;color:var(--muted);margin-top:1px}
.eqitem .ei-tx .av.bad{color:var(--danger)}
.stepper{display:flex;align-items:center;background:var(--paper);border-radius:11px;overflow:hidden;flex-shrink:0}
.stepper button{width:34px;height:36px;font-size:19px;font-weight:700;color:var(--navy-700);display:grid;place-items:center}
.stepper button:active{background:var(--paper-2)}
.stepper .qv{width:38px;text-align:center;font-family:var(--display);font-weight:800;font-size:15px}
.toggle{width:50px;height:30px;border-radius:999px;background:var(--line);position:relative;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--confirm)}
.toggle::after{content:'';position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{left:23px}

.warn-box{background:var(--danger-soft);border:1px solid #f3c9c9;border-radius:13px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;font-size:12.5px;font-weight:600;color:#9a2a2a;line-height:1.45}
.warn-box svg{width:18px;height:18px;flex-shrink:0;margin-top:1px}

.sheet-foot{padding:12px 18px calc(14px + var(--safe-b));border-top:1px solid var(--line);background:var(--paper);display:flex;gap:10px}
.btn{flex:1;padding:15px;border-radius:15px;font-family:var(--display);font-weight:800;font-size:15px;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(150deg,var(--gold-soft),var(--gold-deep));color:#1a1300;box-shadow:0 8px 20px -8px rgba(200,144,28,.6)}
.btn-primary:disabled{opacity:.45;box-shadow:none}
.btn-ghost{background:var(--surface);color:var(--navy-800);box-shadow:var(--shadow-sm);flex:0 0 auto;padding:15px 18px}
.btn-danger{background:var(--danger-soft);color:var(--danger);flex:0 0 auto;padding:15px 18px}
.det-acts{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap}
.det-acts .btn{font-size:14px;padding:13px}

.picker .opt{display:flex;align-items:center;gap:13px;padding:14px;border-radius:15px;background:var(--surface);box-shadow:var(--shadow-sm);margin-bottom:9px;font-weight:700;font-size:16px}
.picker .opt .dot{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-family:var(--display)}

.toast{position:absolute;left:50%;bottom:calc(96px + var(--safe-b));transform:translateX(-50%) translateY(20px);background:var(--navy-900);color:#fff;padding:12px 18px;border-radius:14px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow);z-index:60;opacity:0;transition:.28s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.install-banner{display:none;align-items:center;gap:12px;background:linear-gradient(150deg,var(--navy-800),var(--navy-600));color:#fff;border-radius:var(--r);padding:13px 15px;margin-bottom:16px}
.install-banner.show{display:flex}
.install-banner .it{flex:1;font-size:13px;line-height:1.4}.install-banner .it b{font-family:var(--display)}
.install-banner button{background:var(--gold);color:#1a1300;font-weight:800;padding:9px 14px;border-radius:11px;font-size:13px;flex-shrink:0}
.install-banner .close{background:transparent;color:rgba(255,255,255,.6);font-size:18px;padding:4px}

@media(min-width:560px){.seg-pick .opt{min-width:calc(33.33% - 5px)}}
</style>
</head>
<body>
<div class="app">

const today=()=>iso(new Date());
const parse=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)};
function eachDay(a,b){const out=[];let d=parse(a),e=parse(b),g=0;while(d<=e&&g<400){out.push(iso(d));d.setDate(d.getDate()+1);g++}return out}
function overlap(b,a1,a2){return b.dataInizio<=a2&&b.dataFine>=a1}
function fmtRange(a,b){const da=parse(a),db=parse(b);
  if(a===b)return `${da.getDate()} ${MESI[da.getMonth()].slice(0,3)}`;
  if(da.getMonth()===db.getMonth())return `${da.getDate()}–${db.getDate()} ${MESI[da.getMonth()].slice(0,3)}`;
  return `${da.getDate()} ${MESI[da.getMonth()].slice(0,3)} – ${db.getDate()} ${MESI[db.getMonth()].slice(0,3)}`}
function fmtDay(s){const d=parse(s);return `${d.getDate()} ${MESI[d.getMonth()].slice(0,3)} ${d.getFullYear()}`}
const euro=n=>'€ '+(Number(n)||0).toLocaleString('it-IT',{minimumFractionDigits:0,maximumFractionDigits:0});

/* ============================================================
   STORE — multi-collezione, multi-backend
   Priorità: Firebase (PWA) > window.storage (Claude) > localStorage
   ============================================================ */
const COLLS={
  bookings:{key:'gdl_bookings_v1',doc:'prenotazioni'},
  spese:{key:'gdl_spese_v1',doc:'spese'},
  inventory:{key:'gdl_inventory_v1',doc:'inventario'},
};
const Store={
  mode:'local', fb:null, _cache:{bookings:{},spese:{},inventory:{}}, _watchers:{}, _poll:null,

  fbTried:false, fbError:null,
  async init(){
    if(window.FIREBASE_CONFIG&&window.FIREBASE_CONFIG.apiKey){
      this.fbTried=true;
      try{await this._initFirebase();this.mode='firebase';return}
      catch(e){this.fbError=e;console.warn('Firebase non connesso:',e)}
    }
    if(window.storage&&typeof window.storage.get==='function'){this.mode='claude';return}
    this.mode='local';
  },
  async _initFirebase(){
    const fb=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const fs=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const app=fb.initializeApp(window.FIREBASE_CONFIG);const db=fs.getFirestore(app);
    this.fb={fs,db};
  },
  _ref(coll){return this.fb.fs.doc(this.fb.db,'gdl',COLLS[coll].doc)},

  async read(coll){
    if(this.mode==='claude'){try{const r=await window.storage.get(COLLS[coll].key,true);return r&&r.value?JSON.parse(r.value):{}}catch(e){return {}}}
    if(this.mode==='local'){try{return JSON.parse(localStorage.getItem(COLLS[coll].key)||'{}')}catch(e){return {}}}
    return this._cache[coll]||{};
  },
  async write(coll,map){
    if(this.mode==='firebase'){await this.fb.fs.setDoc(this._ref(coll),{map,ts:Date.now()});this._cache[coll]=map;return}
    if(this.mode==='claude'){await window.storage.set(COLLS[coll].key,JSON.stringify(map),true);this._cache[coll]=map;return}
    localStorage.setItem(COLLS[coll].key,JSON.stringify(map));window.dispatchEvent(new Event('gdl-local-'+coll));this._cache[coll]=map;
  },
  async loadAll(coll){const m=await this.read(coll);this._cache[coll]=m;return Object.values(m)},
  async saveItem(coll,item){const m=await this.read(coll);m[item.id]=item;await this.write(coll,m)},
  async deleteItem(coll,id){const m=await this.read(coll);delete m[id];await this.write(coll,m)},

  watch(coll,cb){
    this._watchers[coll]=cb;
    if(this.mode==='firebase'){
      this.fb.fs.onSnapshot(this._ref(coll),snap=>{const d=snap.data();this._cache[coll]=(d&&d.map)||{};cb(Object.values(this._cache[coll]))});
    }else if(this.mode==='claude'){
      if(!this._poll){this._last={};
        this._poll=setInterval(async()=>{
          for(const c of Object.keys(this._watchers)){
            const m=await this.read(c);const s=JSON.stringify(m);
            if(s!==this._last[c]){this._last[c]=s;this._cache[c]=m;this._watchers[c](Object.values(m))}
          }
        },4000);
      }
    }else{
      window.addEventListener('gdl-local-'+coll,async()=>cb(await this.loadAll(coll)));
      window.addEventListener('storage',async e=>{if(e.key===COLLS[coll].key)cb(await this.loadAll(coll))});
    }
  },
  async getPref(k){
    if(this.mode==='claude'){try{const r=await window.storage.get('gdl_pref_'+k,false);return r?r.value:null}catch(e){return null}}
    try{return localStorage.getItem('gdl_pref_'+k)}catch(e){return null}
  },
  async setPref(k,v){
    if(this.mode==='claude'){try{await window.storage.set('gdl_pref_'+k,v,false)}catch(e){}return}
    try{localStorage.setItem('gdl_pref_'+k,v)}catch(e){}
  },
};

/* ============================================================
   MOTORE DI DISPONIBILITÀ
   ============================================================ */
function qty(b,res){const v=(b.attrezzature||{})[res];if(v===true)return 1;if(v===false)return 0;return Number(v)||0}
function peak(res,a1,a2,status,excludeId){
  let mx=0;const days=eachDay(a1,a2);
  const rel=STATE.bookings.filter(b=>b.id!==excludeId&&(status?b.stato===status:true)&&overlap(b,a1,a2));
  for(const day of days){let s=0;for(const b of rel)if(b.dataInizio<=day&&b.dataFine>=day)s+=qty(b,res);if(s>mx)mx=s}
  return mx;
}
function availability(a1,a2,excludeId){
  const out={};
  for(const res of resKeys()){
    const tot=INV[res].total;
    const conf=peak(res,a1,a2,'confermato',excludeId);
    const pend=peak(res,a1,a2,'da_confermare',excludeId);
    out[res]={total:tot,confermato:conf,attesa:pend,libero:Math.max(0,tot-conf)};
  }
  return out;
}
function checkConfirmable(b){
  const av=availability(b.dataInizio,b.dataFine,b.id);const problemi=[];
  for(const res of resKeys()){const req=qty(b,res);if(!req)continue;
    if(req>av[res].libero)problemi.push({res,richiesti:req,liberi:av[res].libero,gia:av[res].confermato});}
  return problemi;
}

/* ============================================================
   CALENDARIO
   ============================================================ */
function dayLoad(ds){
  let n=0,ratio=0;
  STATE.bookings.forEach(b=>{if(b.dataInizio<=ds&&b.dataFine>=ds)n++});
  resKeys().forEach(res=>{const tot=INV[res].total||1;let s=0;
    STATE.bookings.forEach(b=>{if(b.stato==='confermato'&&b.dataInizio<=ds&&b.dataFine>=ds)s+=qty(b,res)});
    ratio=Math.max(ratio,Math.min(1,s/tot))});
  return {n,ratio};
}
function viewCalendar(){
  const wrap=el('div');
  wrap.appendChild(el('div','vhead',`<div><h1>Calendario</h1><div class="sub">Impegni e prenotazioni</div></div>`));
  const ib=el('div','install-banner');ib.id='install-banner';
  ib.innerHTML=`<div class="it"><b>Installa GDL Services</b><br>Aggiungila alla home per usarla come app.</div><button id="ins-btn">Installa</button><button class="close" id="ins-x">✕</button>`;
  wrap.appendChild(ib);
  const d=STATE.calDate;
  const nav=el('div','cal-nav');nav.innerHTML=`<button id="pm">‹</button><div class="mo">${MESI[d.getMonth()]} ${d.getFullYear()}</div><button id="nm">›</button>`;
  wrap.appendChild(nav);
  const grid=el('div','cal-grid');GIORNI.forEach(g=>grid.appendChild(el('div','cal-dow',g)));
  const first=new Date(d.getFullYear(),d.getMonth(),1);let start=(first.getDay()+6)%7;
  const dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  for(let i=0;i<start;i++)grid.appendChild(el('div','cal-cell out'));
  const tdy=today();
  for(let day=1;day<=dim;day++){
    const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(day)}`;const ld=dayLoad(ds);
    const cell=el('div','cal-cell'+(ds===tdy?' today':''));
    const nc=Math.min(3,STATE.bookings.filter(b=>b.dataInizio<=ds&&b.dataFine>=ds&&b.stato==='confermato').length);
    const np=Math.min(3,STATE.bookings.filter(b=>b.dataInizio<=ds&&b.dataFine>=ds&&b.stato==='da_confermare').length);
    let badges='';for(let i=0;i<nc;i++)badges+='<span class="badge bg-confirm"></span>';for(let i=0;i<np;i++)badges+='<span class="badge bg-pending"></span>';
    cell.innerHTML=`${ld.n>0?`<span class="cnt">${ld.n}</span>`:''}<span class="dn">${day}</span><div class="badges">${badges}</div>`+
      (ld.ratio>0?`<div class="load" style="background:linear-gradient(90deg,var(--confirm) ${ld.ratio*100}%,transparent ${ld.ratio*100}%)"></div>`:'');
    cell.onclick=()=>openDay(ds);grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  wrap.appendChild(el('div','cal-legend','<span><i class="bg-confirm"></i>Confermato</span><span><i class="bg-pending"></i>Da confermare</span>'));
  setTimeout(()=>{
    $('#pm').onclick=()=>{STATE.calDate=new Date(d.getFullYear(),d.getMonth()-1,1);render()};
    $('#nm').onclick=()=>{STATE.calDate=new Date(d.getFullYear(),d.getMonth()+1,1);render()};
    if(STATE._deferredPrompt){ib.classList.add('show');
      $('#ins-btn').onclick=async()=>{STATE._deferredPrompt.prompt();STATE._deferredPrompt=null;ib.classList.remove('show')};
      $('#ins-x').onclick=()=>ib.classList.remove('show');}
  },0);
  return wrap;
}

    row.innerHTML=`<div class="ei-ic"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${inv.icon||DEFAULT_ICON}"/></svg></div>
      <div class="ei-tx"><div class="nm">${esc(inv.label)}</div><div class="av" id="av-${res}"></div></div>`;
    if(isToggle(inv)){const cur=qty(draft,res)>0;draft.attrezzature[res]=cur;
      const tg=el('div','toggle'+(cur?' on':''));tg.onclick=()=>{draft.attrezzature[res]=!draft.attrezzature[res];tg.classList.toggle('on',draft.attrezzature[res]);updateAvail()};row.appendChild(tg);
    }else{const st=el('div','stepper');const step=stepFor(inv);
      const minus=el('button',null,'−'),val=el('div','qv',String(qty(draft,res))),plus=el('button',null,'+');
      minus.onclick=()=>{draft.attrezzature[res]=Math.max(0,qty(draft,res)-step);val.textContent=draft.attrezzature[res];updateAvail()};
      plus.onclick=()=>{draft.attrezzature[res]=Math.min(inv.total,qty(draft,res)+step);val.textContent=draft.attrezzature[res];updateAvail()};
      st.appendChild(minus);st.appendChild(val);st.appendChild(plus);row.appendChild(st)}
    eqc.appendChild(row)});

  body.querySelector('#f-stato').querySelectorAll('.opt').forEach(o=>{o.onclick=()=>{draft.stato=o.dataset.s;body.querySelectorAll('#f-stato .opt').forEach(x=>x.classList.remove('on'));o.classList.add('on');updateAvail()}});

  const cli=body.querySelector('#f-cli'),da=body.querySelector('#f-da'),a=body.querySelector('#f-a'),imp=body.querySelector('#f-imp'),note=body.querySelector('#f-note');
  cli.oninput=e=>draft.cliente=e.target.value;imp.oninput=e=>draft.importo=e.target.value;note.oninput=e=>draft.note=e.target.value;
  da.onchange=e=>{draft.dataInizio=e.target.value;if(draft.dataFine<draft.dataInizio){draft.dataFine=draft.dataInizio;a.value=draft.dataInizio}updateAvail()};
  a.onchange=e=>{draft.dataFine=e.target.value;if(draft.dataFine<draft.dataInizio){draft.dataInizio=draft.dataFine;da.value=draft.dataFine}updateAvail()};

  function updateAvail(){
    const av=availability(draft.dataInizio,draft.dataFine,draft.id);let block=false;const probs=[];
    resKeys().forEach(res=>{const inv=INV[res],a2=av[res],req=qty(draft,res);const lab=body.querySelector('#av-'+res);if(!lab)return;
      if(isToggle(inv)){const free=a2.libero>0;lab.textContent=free?'Disponibile nel periodo':'Occupato nel periodo';lab.className='av'+((req&&!free)?' bad':'');if(req&&!free){probs.push(inv.label);if(draft.stato==='confermato')block=true}}
      else{lab.textContent=`${a2.libero}${inv.unit?' '+inv.unit:''} liberi su ${inv.total}`;const bad=req>a2.libero;lab.className='av'+(bad?' bad':'');if(bad){probs.push(`${inv.label} (max ${a2.libero})`);if(draft.stato==='confermato')block=true}}});
    const w=body.querySelector('#f-warn');
    if(probs.length){const over=draft.stato==='confermato';
      w.innerHTML=`<div class="warn-box ${over?'':'ok'}" style="${over?'':'background:var(--pending-soft);border-color:#f0dcb0;color:#8a5a12'}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><div>${over?'Non confermabile':'Supera la disponibilità'}: ${probs.join(', ')}.${over?' Riduci le quantità o lascia "da confermare".':' Ok come preventivo, ma non confermabile finché non si libera.'}</div></div>`;
    }else w.innerHTML='';
    save.disabled=block;
  }
  setTimeout(updateAvail,0);
  save.onclick=async()=>{
    if(!draft.cliente.trim()){toast('Inserisci il nome del cliente');cli.focus();return}
    if(draft.stato==='confermato'){const prob=checkConfirmable(draft);if(prob.length){const p=prob[0],inv=INV[p.res];toast(`Non confermabile: solo ${p.liberi} ${inv.unit||'pz'} di ${inv.label} liberi`);return}}
    draft.importo=Number(draft.importo)||0;draft.updatedAt=Date.now();
    await Store.saveItem('bookings',draft);sheet.close();toast(editing?'Modifiche salvate':'Preventivo creato');render();
  };
}

/* ============================================================
   BOOTSTRAP + SYNC
   ============================================================ */
async function loadInventory(){
  let m=await Store.read('inventory');
  if(!m||!Object.keys(m).length){m=JSON.parse(JSON.stringify(INV_DEFAULT));await Store.write('inventory',m)}
  INV=m;
}
async function seedIfEmpty(){
  const b=await Store.loadAll('bookings');if(b.length)return;
  const d=new Date();const f=o=>{const x=new Date(d);x.setDate(x.getDate()+o);return iso(x)};
  const demo=[
    {cliente:'Pro Loco Trivento',venditore:'Giuseppe',dataInizio:f(3),dataFine:f(5),importo:1800,stato:'confermato',note:'Sagra di paese — montaggio venerdì mattina.',attrezzature:{kit:60,gen30:false,gen50:true,transenne:20,canalina:30},createdBy:'Giuseppe'},
    {cliente:'Comune di Bojano',venditore:'Domenico',dataInizio:f(4),dataFine:f(4),importo:950,stato:'da_confermare',note:'Concerto in piazza.',attrezzature:{kit:25,gen30:true,gen50:false,transenne:30,canalina:20},createdBy:'Domenico'},
    {cliente:'Matrimonio Di Lella',venditore:'Luigi',dataInizio:f(12),dataFine:f(13),importo:2200,stato:'confermato',note:'',attrezzature:{kit:40,gen30:false,gen50:false,transenne:0,canalina:15},createdBy:'Luigi'},
  ];
  for(const x of demo){x.id='b'+Date.now()+Math.random().toString(36).slice(2,6);x.createdAt=Date.now();await Store.saveItem('bookings',x)}
  const sp=await Store.loadAll('spese');if(!sp.length){
    const demoS=[
      {descrizione:'Ferramenta Vanoli — kit birreria',categoria:'Attrezzatura',importo:4200,data:f(-20),pagataDa:'Società',stato:'pagata',note:'Bonifico da conto societario.',createdBy:'Giuseppe'},
      {descrizione:'Carburante furgone trasporto',categoria:'Carburante',importo:120,data:f(-2),pagataDa:'Domenico',stato:'da_rimborsare',note:'Pieno per consegna Bojano.',createdBy:'Domenico'},
      {descrizione:'Assicurazione gruppi elettrogeni',categoria:'Assicurazione',importo:340,data:f(5),pagataDa:'Società',stato:'da_pagare',note:'',createdBy:'Luigi'},
    ];
    for(const x of demoS){x.id='s'+Date.now()+Math.random().toString(36).slice(2,6);x.createdAt=Date.now();await Store.saveItem('spese',x)}
  }
}
async function boot(){
  await Store.init();
  const pill=$('#sync-pill'),txt=$('#sync-txt');
  if(Store.mode==='firebase'){pill.classList.add('cloud');txt.textContent='Cloud sincronizzato'}
  else if(Store.fbTried){txt.textContent='Cloud non connesso';pill.title='Config letta ma connessione fallita: apri l\'app da https:// (non file://)'}
  else if(Store.mode==='claude'){pill.classList.add('cloud');txt.textContent='Condiviso'}
  else txt.textContent='Locale';
  STATE.me=await Store.getPref('me');renderWho();
  await loadInventory();
  await seedIfEmpty();
  STATE.bookings=await Store.loadAll('bookings');
  STATE.spese=await Store.loadAll('spese');
  Store.watch('bookings',arr=>{STATE.bookings=arr;render()});
  Store.watch('spese',arr=>{STATE.spese=arr;render()});
  Store.watch('inventory',map=>{const m={};arr_to_map(map,m);INV=m;render()});
  $('#whoami').onclick=openPicker;
  $('#fab').onclick=onFab;
  render();
  if(!STATE.me)setTimeout(openPicker,400);
  if('serviceWorker' in navigator){try{await navigator.serviceWorker.register('service-worker.js')}catch(e){}}
}
function arr_to_map(arr,target){(arr||[]).forEach(o=>{if(o&&o.id)target[o.id]=o})}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();STATE._deferredPrompt=e;if(STATE.tab==='cal')render()});
boot();
</script>
